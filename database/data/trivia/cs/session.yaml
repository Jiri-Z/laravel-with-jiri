- answer: Data cookie se ukládají do prohlížeče klienta a potenciálně mohou být dešifrovány
  difficulty: střední
  explanation: Ovladač cookie relace šifruje všechna data relace před uložením do cookie v prohlížeči klienta. Avšak, protože šifrovaný payload je uložen na straně klienta, zůstává na zařízení uživatele.
    I když je šifrování Laravelu (AES-256-CBC) silné, nejlepší praxí je vyhnout se ukládání vysoce citlivých přihlašovacích údajů do jakéhokoli úložiště na straně klienta. Porušení šifrovacího klíče by
    odhalila všechna data relace.
  id: ss-004
  options:
  - Ovladač cookie ukládá data relace bez jakéhokoli šifrování
  - Cookies mají přísný limit velikosti 4 KB, který brání ukládání velkých payloadů relace
  - Cookies vyprší po pevném časovém okně 30 minut bez ohledu na jakékoli nastavení životnosti
  - Data cookie se ukládají do prohlížeče klienta a potenciálně mohou být dešifrovány
