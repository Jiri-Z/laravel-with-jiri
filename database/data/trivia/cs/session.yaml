- answer: config/session.php — spravuje ovladače relace, životnost a další nastavení související s relací
  difficulty: lehká
  explanation: Soubor config/session.php řídí všechna nastavení související s relací v Laravelu, včetně ovladače relace (file, database, redis, atd.), životnosti relace, názvu cookie, cesty, domény a nastavení
    šifrování. Zde přizpůsobujete, jak se relace chovají v vaší aplikaci.
  id: ss-001
  options:
  - config/session.php — spravuje ovladače relace, životnost a další nastavení související s relací
  - config/auth.php — zpracovává ověřovací stráže, poskytovatele a nastavení obnovení hesla
  - config/app.php — spravuje nastavení na úrovni aplikace, jako jsou časové pásmo, locale a ladění
  - config/cache.php — konfiguruje úložiště cache, výchozí ovladač cache a prefix cache
  question: Který konfigurační soubor řídí nastavení relace v Laravelu, včetně ovladače a životnosti?
  topic: session
  type: single
- alternatives:
  - ovladač file
  answer: file
  difficulty: lehká
  explanation: Výchozím ovladačem relace v Laravelu je file, který ukládá data relace do adresáře storage/framework/sessions/. To je pro většinu jednoserverových aplikací dostatečné. Pro distribuované aplikace
    byste přepnuli na ovladače database, redis, memcached nebo dynamodb, aby mohly relace být sdíleny napříč více servery.
  id: ss-002
  question: Jaký je výchozí ovladač relace používaný v nové instalaci Laravelu?
