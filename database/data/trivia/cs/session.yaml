- answers:
  - $request->session()->put('key', 'value')
  - session(['key' => 'value'])
  difficulty: střední
  explanation: put() a globální pomocná funkce session() s polem argumentů ukládají data trvale – zůstávají v relaci, dokud nejsou explicitně odstraněny. flash() ukládá data pouze pro další požadavek (pak
    se automaticky smaže) a now() ukládá data pouze pro aktuální požadavek (není dostupné ani pro další požadavek). Porozumění těmto rozdílům v životnosti je klíčové pro správné zpracování zpráv flash.
  id: ss-006
  options:
  - $request->session()->flash('key', 'value')
  - session(['key' => 'value'])
  - $request->session()->now('key', 'value')
  - $request->session()->put('key', 'value')
  question: Které z následujících metod relace uloží data, která přetrvávají i po dalším požadavku? (Vyberte všechny, které platí)
  topic: session
  type: multiple
- answer: flash() přetrvává pro další požadavek; now() existuje pouze v aktuálním požadavku
  difficulty: střední
  explanation: flash() ukládá data relace, která budou dostupná v aktuálním a dalším požadavku, a poté se automaticky odstraní. To je ideální pro stavové zprávy po přesměrováních. now() ukládá data pouze
    pro životnost aktuálního požadavku – nebudou dostupné v následujících požadavcích. To je užitečné pro dočasná data, která potřebujete v rámci stejného cyklu požadavku.
  id: ss-007
  options:
  - flash() přetrvává pro další požadavek; now() existuje pouze v aktuálním požadavku
  - now() přetrvává pro další požadavek; flash() existuje pouze v aktuálním požadavku
  - Mezi těmito dvěma metodami není významný rozdíl – slouží jako zaměnitelné aliasy
  - flash() šifruje data relace před uložením, zatímco now() ukládá data v prostém textu
  question: Jaký je rozdíl mezi session()->flash() a session()->now()?
  topic: session
  type: single
- answer: Aby mohli správci dotazovat a neplatnit všechny relace pro konkrétního uživatele
  difficulty: těžká
  explanation: Sloupec user_id v tabulce relací umožňuje cílit na relace konkrétního uživatele. To je klíčové pro funkce jako 'odhlásit ze všech ostatních zařízení' nebo vynucení změny hesla zneplatněním
    všech existujících relací pro uživatele. Můžete dotazovat DB::table('sessions')->where('user_id', $userId)->delete(), abyste toho dosáhli. Není to o vynucení jedné relace nebo výkonu.
  id: ss-008
  options:
  - Zrychlení dotazů na načítání relace poskytnutím sekundárního databázového indexu na user_id
  - Aby mohli správci dotazovat a neplatnit všechny relace pro konkrétního uživatele
  - A vynutit přísnou politiku jedné relace, aby každý uživatel mohl mít pouze jednu aktivní relaci
  - A automaticky obnovit předchozí data relace uživatele po úspěšném ověření
  question: Když se používá ovladač relace 'database', proč Laravel ukládá user_id do tabulky relací, když je uživatel ověřen?
  topic: session
  type: single
- alternatives:
  - keep
  - session()->reflash
  - session()->keep
  answer: reflash
  difficulty: těžká
  explanation: Obě metody reflash() a keep() brání smazání flash dat. Metoda reflash() uchová všechny aktuálně flashované hodnoty pro další požadavek. Metoda keep(['key']) je selektivnější — uchová pouze
    zadané klíče. To je užitečné v vícekrokových průvodcích formulářemi, kde potřebujete, aby flash data přetrvala přes několik cyklů přesměrování.
  id: ss-009
  question: Jaká metoda na instanci session udržuje flashovanou hodnotu naživu pro jeden další požadavek, čímž brání její automatickému smazání?
  topic: session
  type: text
- answers:
  - StartSession
  - EncryptCookies
  difficulty: těžká
  explanation: Middleware StartSession (který čte/zapisuje session data) a middleware EncryptCookies (který dešifruje Laravel session cookie předtím, než session začne) musí být oba přítomny v middleware
    stacku, aby sessions správně fungovaly. Bez EncryptCookies nelze dešifrovat session ID cookie. Bez StartSession se session nikdy neinicializuje. VerifyCsrfToken používá session, ale pro samotnou funkčnost
    session není vyžadován.
  id: ss-010
  options:
  - StartSession
  - EncryptCookies
  - Authenticate
  - VerifyCsrfToken
