  - artisan session:table
  answer: php artisan session:table
  difficulty: střední
  explanation: Spuštění php artisan session:table vytvoří migraci, která přidá tabulku sessions s sloupci pro id, user_id, ip_address, user_agent, payload, last_activity a příslušné indexy. Po spuštění
    migrace můžete v souboru .env nastavit SESSION_DRIVER=database pro ukládání relací do databáze.
  id: ss-005
  question: Jaký Artisan příkaz generuje migrační soubor potřebný pro použití ovladače relace 'database'?
  topic: session
