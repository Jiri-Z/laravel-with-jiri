  type: text
- answers:
  - file
  - cookie
  - database
  - redis
  difficulty: lehká
  explanation: 'Laravel dodává několik ovladačů relace: file (systém souborů), cookie (šifrované cookies na klientovi), database (tabulka relační databáze), redis, memcached, dynamodb, array (v paměti,
    pro testování) a null (žádná relace). Každý ovladač má různé kompromisy z hlediska výkonu, škálovatelnosti a zabezpečení.'
  id: ss-003
