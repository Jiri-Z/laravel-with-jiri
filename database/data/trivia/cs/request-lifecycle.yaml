  question: V Laravel 13.x, když je spuštěn příkaz 'php artisan config:cache', které z následujících důsledků pro životní cyklus nastanou?
  options:
  - Soubor .env se již při každém požadavku nečte; místo toho se použije cachovaná konfigurace
  - Změny proměnných v .env se neprojeví, dokud nebude znovu spuštěn config:cache
  - Všichni service provider jsou okamžitě znovu zaregistrováni
  - Aplikace automaticky detekuje změny v konfiguraci a znovu je cachuje
  answers:
  - Soubor .env se již při každém požadavku nečte; místo toho se použije cachovaná konfigurace
  - Změny proměnných v .env se neprojeví, dokud nebude znovu spuštěn config:cache
  explanation: Když je spuštěn config:cache, Laravel spojí všechny konfigurační soubory s hodnotami z .env do jednoho cachovaného souboru v bootstrap/cache/. Po tomto kroku se soubor .env při každém požadavku
    nečte. Jakékoliv změny v souboru .env nebo konfiguračních souborech budou ignorovány, dokud znovu nespustíte config:clear a následně config:cache. To je běžný zdroj zmatků při ladění v produkčním prostředí.
