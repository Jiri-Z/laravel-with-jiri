  type: text
- answers:
  - '@extends'
  - '@yield'
  - '@section'
  difficulty: lehká
  explanation: Dědičnost šablon v Blade používá @extends('layout.name') v podřízené šabloně pro určení rodiče, @yield('name') v rodiči pro definici slotů a @section('name') v podřízené šabloně pro vyplnění
    těchto slotů. V Blade neexistuje direktiva @import — tento koncept patří jiným template enginům.
  id: bt-004
  options:
  - '@section'
  - '@import'
  - '@extends'
  - '@yield'
