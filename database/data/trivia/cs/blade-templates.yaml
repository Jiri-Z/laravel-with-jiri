- answer: '{{ }} automaticky escapuje HTML entity, zatímco {!! !!} vypsuje surové neescapované HTML'
  difficulty: lehká
  explanation: Dvojité složené závorky {{ }} automaticky escapují speciální HTML znaky pomocí PHP's htmlspecialchars(), čímž brání útokům XSS. Syntaxe {!! !!} vypisuje obsah tak, jak je, což je nebezpečné
    s uživatelským vstupem. Používejte {!! !!} pouze tehdy, když máte důvěryhodný, předem očištěný HTML obsah, který by měl být vykreslen jako HTML.
  id: bt-001
  options:
  - '{{ }} automaticky escapuje HTML entity, zatímco {!! !!} vypsuje surové neescapované HTML'
  - Mezi těmito dvěma syntaxemi není žádný rozdíl; jsou plně zaměnitelné ve všech kontextech Blade šablon
  - '{{ }} je rychlejší, protože používá jednodušší kompilační cestu; {!! !!} je pomalejší kvůli dodatečnému parsování'
  - '{{ }} funguje pouze s řetězcovými proměnnými, zatímco {!! !!} je vyžadováno při vykreslování polí nebo kolekcí dat'
  question: Jaký je hlavní rozdíl mezi {{ $name }} a {!! $name !!} v Blade šablonách?
