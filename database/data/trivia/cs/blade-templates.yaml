  answer: '@section'
  difficulty: lehká
  explanation: Direktiva @section definuje blok obsahu, který mapuje na @yield v nadřazeném layoutu. Například @section('title', 'Home') definuje krátký sekci, zatímco @section('content') ... @endsection
    definuje blok. Nadřazený layout používá @yield('title') a @yield('content') pro umístění obsahu z podřízené šablony.
  id: bt-003
  question: Jaká Blade direktiva se používá k definování sekce obsahu v podřízené šabloně, která bude vložena do @yield v nadřazeném layoutu?
