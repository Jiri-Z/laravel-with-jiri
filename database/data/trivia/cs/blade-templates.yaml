- answer: Deklaruje, že komponenta by měla přijímat specifická data od své rodičovské komponenty bez explicitního předávání props
  difficulty: těžká
  explanation: '@aware([''color'' => ''gray'']) v dceřiné komponentě deklaruje, že očekává přijetí ''color'' z rodičovské komponenty''s @props nebo data. Když rodičovská komponenta vykresluje tohoto potomka,
    odpovídající data rodiče automaticky proudí dolů. To je zvláště užitečné u vnořených komponent v komponentách založených na třídách, kde chcete implicitní předávání dat.'
  id: bt-026
