  answer: ComponentAttributeBag
  difficulty: těžká
  explanation: Třída ComponentAttributeBag spravuje atributy komponent a poskytuje inteligentní sloučení tříd, stylů a dalších atributů. Když komponenta definuje výchozí atributy a spotřebitel přidá další,
    tačka je sloučí, nikoli přepíše. Poskytuje metody jako class(), style(), merge() a filter() pro jemnou kontrolu v komponentách založených na třídách.
