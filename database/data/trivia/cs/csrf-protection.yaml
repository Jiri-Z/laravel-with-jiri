  - <meta name='csrf-token'>
  - meta name csrf-token
  answer: csrf-token
  difficulty: střední
  explanation: 'Starter sady a dokumentace Laravelu používají <meta name=''csrf-token'' content=''{{ csrf_token() }}''>. JavaScriptové knihovny a frameworky mohou poté číst tento meta tag a zahrnout token
    do AJAX požadavků. Axios, například, lze nakonfigurovat globálně pro čtení z tohoto tagu: axios.defaults.headers.common[''X-CSRF-TOKEN''] = document.querySelector(''meta[name="csrf-token"]'').getAttribute(''content'');'
