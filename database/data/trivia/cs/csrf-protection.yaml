  options:
  - Ověřte webhook pomocí podpisu nebo klíče z externí služby místo CSRF tokenů
  - Globálně vypněte ochranu CSRF v souboru bootstrap/app.php
  - Přidejte URI webhooku do pole $except ve třídě VerifyCsrfToken, aby pro daný route byly kontroly CSRF přeskočeny
  - Vytvořte vlastní middleware, který ověřuje podpis webhooku, a použijte jej místo VerifyCsrfToken
  question: Při konfiguraci endpointů webhooků pro příjem POST požadavků z externích služeb (jako Stripe), které z následujících jsou platné přístupy ke zpracování ochrany CSRF?
  topic: csrf-protection
  type: multiple
- answer: Sanctum automaticky aplikuje middleware VerifyCsrfToken na trasy pro ověřování pomocí cookie pro SPA a nastavuje cookie XSRF-TOKEN pro čtení frontendem
  difficulty: střední
  explanation: Při použití ověřování pomocí cookie pro SPA (Single Page Application) v Sanctum Sanctum konfiguruje ochranu proti CSRF tak, aby fungovala s vaším frontendem. Zajišťuje, že cookie XSRF-TOKEN
    je nastavena a middleware VerifyCsrfToken validuje požadavky. To se liší od ověřování pomocí API tokenu, které nevyžaduje ochranu proti CSRF. Middleware je automaticky aplikován na trasy uvnitř skupiny
    'sanctum.csrf' nebo skupiny 'web'.
  id: cs-020
  options:
  - Sanctum používá vlastní middleware pro CSRF, který validuje tokeny pomocí přístupu založeného na JWT namísto standardního porovnávání tokenů založených na session
  - Sanctum automaticky aplikuje middleware VerifyCsrfToken na trasy pro ověřování pomocí cookie pro SPA a nastavuje cookie XSRF-TOKEN pro čtení frontendem
  - Sanctum úplně vypne ochranu proti CSRF pro aplikace SPA, protože používají ověřování pomocí tokenů, které nezávisí na prohlížečových cookie
  - Sanctum generuje samostatný a unikátní CSRF token pro každý jednotlivý API požadavek a zahrnuje jej do hlaviček odpovědi pro frontend
  question: Jak Laravel Sanctum zpracovává ochranu proti CSRF pro ověřování pomocí SPA (Single Page Application)?
  topic: csrf-protection
  type: single
- answer: Požadavky GET jsou vyjmuty z ověření CSRF, takže útočník by mohl vytvořit odkaz nebo tag img, který spustí akci, když prohlížeč uživatele načte škodlivou stránku
  difficulty: střední
  explanation: Protože Laravel vyjímá požadavky GET z ověření CSRF, jakákoli akce měnící stav, která je přístupná přes GET, je zranitelná. Útočník by mohl vložit <img src='https://yourapp.com/users/1/delete'>
    do e-mailu nebo webové stránky a prohlížeč uživatele by provedl požadavek s jejich cookies relace. Vždy používejte POST, PUT, PATCH nebo DELETE pro operace měnící stav — tyto metody jsou chráněny CSRF
    tokeny.
  id: cs-021
  options:
  - Požadavky GET jsou plně chráněny CSRF tokeny stejně jako požadavky POST, takže při použití GET pro změny stavu neexistuje žádné další bezpečnostní riziko
  - Prohlížeče automaticky vylepšují požadavky GET na požadavky POST pro zvýšení bezpečnosti dříve, než dosáhnou vrstvy směrování Laravel aplikace
  - Požadavky GET jsou vyjmuty z ověření CSRF, takže útočník by mohl vytvořit odkaz nebo tag img, který spustí akci, když prohlížeč uživatele načte škodlivou stránku
  - Požadavky GET nelze použít pro akce měnící stav, protože router Laravelu automaticky blokuje jakoukoli trasu, která mění stav aplikace
  question: Jaké bezpečnostní implikace má použití požadavku GET pro provádění akcí měnících stav (jako je mazání zdroje) v Laravel aplikaci s ochranou CSRF?
  topic: csrf-protection
  type: single
- alternatives:
  - hash_equals()
  answer: hash_equals
  difficulty: střední
  explanation: Laravel používá funkci hash_equals() PHP pro bezpečné porovnání řetězců z hlediska načasování při ověřování CSRF tokenů. To brání útokům načasování, kdy by útočník mohl měřit dobu odezvy
    a postupně zjistit správné znaky tokenu po znacích. Porovnání bezpečné z hlediska načasování vždy trvá stejnou dobu bez ohledu na to, kolik znaků odpovídá, což činí takové útoky ne proveditelnými.
  id: cs-022
  question: Jakou metodu PHP používá middleware VerifyCsrfToken k porovnání tokenu z požadavku s tokenem uloženým v session?
  topic: csrf-protection
  type: text
- answers:
  - Uživatel nechal formulář otevřený po dlouhou dobu a jeho session vypršela, než ho odeslal
  - Session byla regenerována mezi načtením formuláře a jeho odesláním
  - Uživatel má v prohlížeči zakázané cookies
  - Aplikace běží v prostředí s load balancerem bez sdíleného úložiště session
  difficulty: střední
  explanation: Všechny tyto scénáře mohou způsobit selhání validace CSRF. Vypršení session znamená, že token uložený na straně serveru zmizel. Regenerace session vytvoří nový token, který neodpovídá starému
    z formuláře. Zakázané cookies znamenají, že session (a token) nemohou být zachovány. Bez sdílených session v load balanceru může požadavek narazit na jiný server, který nemá session. Každý scénář vyžaduje
    jiné řešení (doladování životnosti session, obnovení tokenu, požadavky na cookies, konfigurace session driveru).
  id: cs-023
  options:
  - Session byla regenerována mezi načtením formuláře a jeho odesláním
  - Uživatel nechal formulář otevřený po dlouhou dobu a jeho session vypršela, než ho odeslal
  - Uživatel má v prohlížeči zakázané cookies
  - Aplikace běží v prostředí s load balancerem bez sdíleného úložiště session
  question: Který z následujících scénářů může způsobit, že legitimní uživatel oběří chybu 419 Page Expired?
  topic: csrf-protection
  type: multiple
- answer: Protože CSRF token je vázán na session driver a klienti API používající autentizaci tokenem nemusí mít aktivní session obsahující tento token
  difficulty: těžká
  explanation: CSRF tokeny jsou uloženy a ověřovány vůči session. Pokud se API klient autentizuje pomocí Bearer tokenu (ne cookies), session nemusí být spuštěna nebo nemusí obsahovat CSRF token. Middleware
    VerifyCsrfToken získává token z session a bez platné session jej nemůže ověřit. To je důvod, proč se ochrana proti CSRF obvykle neaplikuje na čisté API trasy — spoléhá na infrastrukturu session.
  id: cs-024
  options:
  - Protože middleware VerifyCsrfToken ověřuje tokeny pouze pro autentizační guard 'web' bez ohledu na přiřazenou middleware group trasy
  - Protože požadavky API vždy používají jiný šifrovací klíč pro generování a ověřování CSRF tokenů ve srovnání s middleware group web
  - Protože CSRF tokeny vyprší pevně stanoveném časovém okně 60 sekund bez ohledu na životnost session, což způsobuje časté selhání ověřování u pomalých volání API
  - Protože CSRF token je vázán na session driver a klienti API používající autentizaci tokenem nemusí mít aktivní session obsahující tento token
  question: V aplikaci Laravel používající zároveň více guardů (web a api) proč může CSRF chráněný POST požadavek selhat i s platným tokenem, když požadavek pochází z API klienta?
  topic: csrf-protection
  type: single
- answer: Token na požadavek by zabránil uživateli v použití tlačítka Zpět v prohlížeči nebo otevírání více karet s formuláři, protože každý formulář by měl jiný token
  difficulty: těžká
  explanation: Laravel používá token na relaci (ne na požadavek) přesně proto, aby se předešlo problémům s použitelností. Token na požadavek by byl neplatný, jakmile by byl odeslán jakýkoliv formulář na
    stránce, což by znemožnilo mít více formulářů otevřených v různých kartách, používat tlačítko Zpět nebo řešit chyby validace formuláře. Náhradou je, že token na relaci poskytuje méně ochrany proti určitým
    teoretickým útokům, ale praktická bezpečnost s cookies SameSite a tokeny na relaci je považována za dostatečnou.
  id: cs-025
  options:
  - Token na požadavek by zabránil uživateli v použití tlačítka Zpět v prohlížeči nebo otevírání více karet s formuláři, protože každý formulář by měl jiný token
  - Token na požadavek by byl zranitelný vůči útokům XSS, které by mohly ukrást čerstvý token z DOM před odesláním formuláře
  - Token na požadavek by neposkytoval dostatečnou ochranu proti útokům s opakováním, kdy útočník zachytí a znovu odešle dříve zachycený platný požadavek
  - Token na požadavek by způsobil podmíněnou závislost při současném odesílání více AJAX požadavků, protože každý požadavek by zneplatnil token pro ostatní
  question: Jaký potenciální bezpečnostní problém by mohl vzniknout, pokud implementujete ochranu CSRF pouze pomocí tokenu na požadavek (generovaného čerstvého pro každý požadavek) bez jakéhokoliv trvalého
    tokenu na relaci?
  topic: csrf-protection
  type: single
- answers:
  - Token musí být kryptograficky náhodný a dostatečně dlouhý (alespoň 40 znaků) pro prevenci hádání hrubou silou
  - Porovnání tokenů musí používat časově bezpečné porovnání pro prevenci časových útoků vedlejších kanálů
  - Token musí být unikátní na relaci a musí být regenerován, když je regenerována relace
  difficulty: těžká
  explanation: 'Bezpečná implementace CSRF vyžaduje: (1) kryptograficky náhodné tokeny pomocí CSPRNG (Laravel používá Str::random(40)), (2) časově bezpečné porovnání pomocí hash_equals() pro prevenci časových
    útoků, a (3) unikátnost na relaci s regenerací. Token NEMUSÍ být v formuláři šifrován — je to veřejná hodnota, která musí odpovídat serverovému tajemství. Šifrování tokenu by nepřidalo žádný bezpečnostní
    přínos, protože porovnávaná hodnota (v relaci) by stále byla potřeba.'
  id: cs-026
  options:
  - Token musí být unikátní na relaci a musí být regenerován, když je regenerována relace
  - Token musí být před uložením do formuláře šifrován, aby se zabránilo krádeži tokenu pomocí XSS
  - Token musí být kryptograficky náhodný a dostatečně dlouhý (alespoň 40 znaků) pro prevenci hádání hrubou silou
  - Porovnání tokenů musí používat časově bezpečné porovnání pro prevenci časových útoků vedlejších kanálů
  question: Při vytváření vlastní implementace CSRF tokenu, které bezpečnostní vlastnosti musí být zachovány, aby odpovídaly úrovni ochrany Laravelu?
  topic: csrf-protection
  type: multiple
- alternatives:
  - database
  - redis
  - memcached
  - dynamodb
  - jakýkoli ovladač, který ukládá relace centralizovaně
  answer: Sdílený ovladač relací (database, Redis, Memcached nebo DynamoDB)
  difficulty: těžká
  explanation: Výchozí ovladač relací 'file' ukládá data relací na místní souborový systém. V prostředí s vyrovnáváním zátěže s více servery může požadavek narazit na Server A (který vytvoří relaci a CSRF
    token), zatímco následný požadavek narazí na Server B (který nemá ten soubor relace). Musíte použít centralizovaný ovladač relací — database, Redis, Memcached nebo DynamoDB — aby všichni serveři mohli
    přistupovat ke stejným datům relací a ověřovat CSRF tokeny konzistentně.
  id: cs-027
  question: Jaká konfigurace ovladače relací v Laravelu je vyžadována při běhu za více aplikačními servery (s vyrovnáváním zátěže), aby se zajistilo, že CSRF tokeny zůstanou platné na všech serverech?
  topic: csrf-protection
  type: text
- answer: Šifrovaná hodnota cookie nebude odpovídat syrovému tokenu relace, což způsobí selhání ověření CSRF i pro legitimní požadavky
  difficulty: těžká
  explanation: Pokud je cookie XSRF-TOKEN šifrována (není v seznamu $except EncryptCookies), hodnota cookie bude šifrovaný řetězec. Když JavaScript přečte tuto cookie a odešle ji jako hlavičku X-XSRF-TOKEN,
    VerifyCsrfToken se pokusí ji dešifrovat (zpracovává XSRF-TOKEN dešifrováním) — ale pokud je dvojité šifrování nebo šifrováno jinak než se očekává, porovnání selže. Laravel vylučuje 'XSRF-TOKEN' ze šifrování
    ve výchozím nastavení, ale chybná konfigurace může způsobit tento problém.
  id: cs-028
  options:
  - Šifrování cookie XSRF-TOKEN by způsobilo zranitelnost dvojitého šifrování, která oslabuje celkové šifrování
  - Šifrovaná hodnota cookie nebude odpovídat syrovému tokenu relace, což způsobí selhání ověření CSRF i pro legitimní požadavky
  - Middleware EncryptCookies by odstranil cookie z požadavku, než by ho VerifyCsrfToken mohl přečíst
  - Šifrovaná cookie se výrazně zvětší a může překročit maximální velikost cookie v prohlížeči 4096 bajtů
  question: Jak vytvoření potenciálního problému mezi middleware EncryptCookies a VerifyCsrfToken v Laravelu, pokud je cookie XSRF-TOKEN omylem zahrnuta do šifrování?
  topic: csrf-protection
  type: single
- answers:
  - Ošetřit validaci CSRF na úrovni brány a odstranit tokeny CSRF před předáváním požadavků interním službám
  - Předat ověřený CSRF token interním službám pomocí vlastní hlavičky, aby mohly ověřit, že branu provedla validaci
  - Použít sdílené tajemství mezi bránou a interními službami, podepisovat každý předaný požadavek pomocí HMAC
  difficulty: těžká
  explanation: 'V architektuře s bránou by měla být CSRF validována na okraji (bráně). Interní služby obvykle komunikují server-server bez kontextu prohlížeče, takže je zde CSRF irelevantní. Platné strategie
    zahrnují: validaci na bráně a nepředávání interním službám, předání důkazu o validaci, nebo použití interní autentizace (HMAC/sdílené tajemství) mezi bránou a službami. Implementace CSRF nezávisle na
    každé interní službě by byla zbytečná a komplikovaná, a vypnutí na bráně by odstranilo ochranu úplně.'
  id: cs-029
  options:
  - Použít sdílené tajemství mezi bránou a interními službami, podepisovat každý předaný požadavek pomocí HMAC
  - Ošetřit validaci CSRF na úrovni brány a odstranit tokeny CSRF před předáváním požadavků interním službám
  - Předat ověřený CSRF token interním službám pomocí vlastní hlavičky, aby mohly ověřit, že branu provedla validaci
  - Vypnout ochranu CSRF na bráně a implementovat ji nezávisle na každé interní službě
  question: V architektuře mikroslužeb, kde Laravel brána předává požadavky interním službám, které z následujících jsou platné strategie ochrany CSRF?
  topic: csrf-protection
  type: multiple
