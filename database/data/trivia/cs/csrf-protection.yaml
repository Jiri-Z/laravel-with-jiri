  - X-CSRF-TOKEN očekává sytou hodnotu tokenu (typicky z meta tagu); X-XSRF-TOKEN očekává šifrovanou hodnotu cookie, kterou Laravel automaticky dešifruje
  - Oba hlavičky jsou přijímány middlewarem VerifyCsrfToken, ale očekávají různé formáty tokenu
  difficulty: střední
  explanation: Middleware VerifyCsrfToken kontroluje obě hlavičky, ale zpracovává je odlišně. X-CSRF-TOKEN by měl obsahovat sytou řetězcovou hodnotu tokenu (shodnou s tou v session). X-XSRF-TOKEN by měl
    obsahovat hodnotu z cookie XSRF-TOKEN — Laravel automaticky dešifruje tuto hodnotu cookie před porovnáním. Axios čte cookie XSRF-TOKEN a odesílá ji jako hlavičku X-XSRF-TOKEN, což činí tento přístup
    jednodušším pro AJAX.
  id: cs-016
  options:
  - X-XSRF-TOKEN je jediná hlavička, kterou Laravelova vestavěná konfigurace Axios odesílá automaticky
  - X-CSRF-TOKEN očekává sytou hodnotu tokenu (typicky z meta tagu); X-XSRF-TOKEN očekává šifrovanou hodnotu cookie, kterou Laravel automaticky dešifruje
  - Oba hlavičky jsou přijímány middlewarem VerifyCsrfToken, ale očekávají různé formáty tokenu
  - X-CSRF-TOKEN je pouze pro POST požadavky; X-XSRF-TOKEN je pro všechny metody požadavků
