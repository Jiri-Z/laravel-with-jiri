  options:
  - Protože zakázání ochrany proti CSRF také zakáže šifrování session, což by odhalilo citlivá data uživatelů potenciálnímu zachycení
  - Protože jakýkoliv škodlivý web by mohl oklamat ověřené uživatele, aby prováděli nežádoucí akce odesíláním formulářů do vaší aplikace
  - Protože Laravel vyvolá runtime chybu, pokud middleware proti CSRF není správně registrován ve skupině middleware 'web' během bootstrappingu
  - Protože celkový výkon aplikace se bez režie ověřování CSRF tokenu na každý požadavek výrazně snižuje
