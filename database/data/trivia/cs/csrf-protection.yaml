- answers:
  - Zahrnutí hlavičky X-XSRF-TOKEN přečtené z cookie XSRF-TOKEN
  - Zahrnutí hlavičky X-CSRF-TOKEN s hodnotou meta tagu nazvaného csrf-token
  - Přidání tokenu jako parametru dotazu s názvem _token
  difficulty: lehká
  explanation: 'Laravel podporuje více přístupů pro AJAX: (1) Přečíst cookie XSRF-TOKEN (automaticky nastavenou Laravelu) a poslat ji jako hlavičku X-XSRF-TOKEN — middleware VerifyCsrfToken to automaticky
    kontroluje. (2) Přečíst meta tag csrf-token a poslat ho jako X-CSRF-TOKEN. (3) Zahrnout _token jako parametr dotazu. Všechny tři přístupy jsou validovány middlewarem.'
  id: cs-006
  options:
  - Zahrnutí hlavičky X-XSRF-TOKEN přečtené z cookie XSRF-TOKEN
  - Zahrnutí hlavičky X-CSRF-TOKEN s hodnotou meta tagu nazvaného csrf-token
  - Přidání tokenu jako parametru dotazu s názvem _token
  - Nastavení document.cookie s CSRF tokenem před požadavkem
