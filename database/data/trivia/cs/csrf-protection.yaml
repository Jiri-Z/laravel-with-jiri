- answer: Aktuální řetězec CSRF tokenu, který by měl být zahrnut ve formulářích a AJAX požadavcích
  difficulty: lehká
  explanation: 'Funkce csrf_token() vrací prostý textový řetězec CSRF tokenu. Můžete ho použít programově (např. v API odpovědích nebo JavaScriptu), když direktiva @csrf v Blade není vhodná. Například můžete
    ho předat svému frontendu přes meta tag: <meta name=''csrf-token'' content=''{{ csrf_token() }}''>.'
  id: cs-007
