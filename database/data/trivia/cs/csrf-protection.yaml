- alternatives:
  - 419 Page Expired
  - 419 (Page Expired)
  answer: '419'
  difficulty: lehká
  explanation: Laravel vrací stavový kód 419 Page Expired, když ověření CSRF selže. Jedná se o nestandardní stavový kód specifický pro Laravel (není v oficiální HTTP specifikaci). Stavový kód 419 byl zvolen,
    aby se odlišila chyba CSRF od standardního 403 Forbidden. Výchozí chybová stránka zobrazuje uživateli text '419 Page Expired'.
  id: cs-008
