- answer: SameSite=Lax umožňuje odesílání cookies při navigacích nejvyšší úrovně (GET požadavky z odkazů), ale blokuje je u cross-site POST požadavků, přidává vrstvu obrany v hloubce spolu s CSRF tokenem
  difficulty: střední
  explanation: 'Laravel nastavuje atribut SameSite=Lax na cookies ve výchozím nastavení. To znamená, že prohlížeče nebudou zahrnovat cookies v cross-site POST požadavcích (které jsou hlavním vektorem útoků
    CSRF), zatímco stále umožňují jejich odesílání pro navigace nejvyšší úrovně GET (jako je následování odkazů). To poskytuje obranu v hloubce: i když by byl CSRF token nějakým způsobem kompromitován,
    atribut SameSite brání odesílání session cookie s cross-origin formuláři.'
  id: cs-015
  options:
  - SameSite=Strict brání prohlížeči v zahrnutí cookies na jakémkoliv cross-site požadavku, úplně blokuje útoky CSRF bez nutnosti mechanismu ověření založeného na tokenu
  - SameSite=Lax umožňuje odesílání cookies při navigacích nejvyšší úrovně (GET požadavky z odkazů), ale blokuje je u cross-site POST požadavků, přidává vrstvu obrany v hloubce spolu s CSRF tokenem
  - Atribut SameSite cookie nemá přímou souvislost s ochranou proti CSRF — je navržen pouze k řízení, zda třetí strany mohou přistupovat k cookies ve vlastním kontextu
  - SameSite=None zakazuje všechny omezení SameSite pro cookies, spoléhá se výhradně na mechanismus CSRF tokenu aplikace pro ochranu proti cross-site request forgery
