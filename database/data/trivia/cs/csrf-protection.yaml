- answer: Protože jakýkoliv škodlivý web by mohl oklamat ověřené uživatele, aby prováděli nežádoucí akce odesíláním formulářů do vaší aplikace
  difficulty: střední
  explanation: Bez ochrany proti CSRF může útočník vytvořit stránku na vlastní doméně s skrytým formulářem, který se automaticky odešle do vaší aplikace. Protože prohlížeč uživatele automaticky zahrnuje
    session cookies, požadavek se jeví jako ověřený. Toto lze použít k převodu peněz, změně emailových adres, smazání dat nebo provedení jakékoli akce, kterou je uživatel oprávněn provádět. Tokeny proti
