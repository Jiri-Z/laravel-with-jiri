- answers:
  - Obsahuje stejnou hodnotu jako CSRF token uložený v session
  - Má krátkou dobu platnosti odpovídající životnosti session
  difficulty: lehká
  explanation: XSRF-TOKEN cookie je nastavena middleware VerifyCsrfToken a obsahuje surovou (nešifrovanou) hodnotu CSRF tokenu. Je explicitně vyloučena ze šifrování v konfiguraci middleware EncryptCookies.
    To umožňuje JavaScriptovým frameworkům (jako Angular) číst cookie a odesílat ji zpět jako hlavičku X-XSRF-TOKEN. Doba platnosti cookie je vázána na session.
  id: cs-009
  options:
  - Obsahuje stejnou hodnotu jako CSRF token uložený v session
  - Má krátkou dobu platnosti odpovídající životnosti session
  - Je ve výchozím nastavení šifrována jako ostatní Laravel cookies
  - Je nastavena automaticky konfigurací except v middleware EncryptCookies
  question: Které z následujících tvrzení jsou pravdivé ohledně XSRF-TOKEN cookie, kterou nastavuje Laravel?
  topic: csrf-protection
  type: multiple
- answer: Protože cookie XSRF-TOKEN musí být čitelná klientským JavaScriptem (např. Angular, Axios), aby mohla být zahrnuta v záhlaví AJAX, a šifrované cookies nelze přečíst bez serverového dešifrování
  difficulty: střední
  explanation: 'Cookie XSRF-TOKEN je speciálně navržena tak, aby byla čitelná frontendovými JavaScriptovými frameworky. Axios například automaticky čte cookie XSRF-TOKEN a odesílá ji jako záhlaví X-XSRF-TOKEN.
    Pokud by cookie byla šifrována, JavaScript by nemohl přečíst její hodnotu. Cookie je stále chráněná, protože: (1) je nastavena serverem, (2) má atribut SameSite a (3) musí odpovídat serverovému session
    tokenu.'
  id: cs-010
  options:
  - Protože cookie XSRF-TOKEN je ve výchozím nastavení nastavena s příznakem HttpOnly a nelze k ní přistupovat z klientského JavaScriptu bez ohledu na to, zda je šifrována nebo ne
  - Protože šifrování přidává příliš velký výpočetní overhead pro token, který se mění u každého jednotlivého požadavku, což by výrazně zpomalilo celý AJAX pipeline
  - Protože cookie XSRF-TOKEN je již podepsána bezpečným HMAC pomocí aplikačního klíče, což poskytuje dostatečnou ochranu integrity bez nutnosti dalšího šifrování
  - Protože cookie XSRF-TOKEN musí být čitelná klientským JavaScriptem (např. Angular, Axios), aby mohla být zahrnuta v záhlaví AJAX, a šifrované cookies nelze přečíst bez serverového dešifrování
  question: Proč Laravel ve výchozím nastavení šifruje většinu cookies, ale úmyslně vylučuje cookie XSRF-TOKEN ze šifrování?
