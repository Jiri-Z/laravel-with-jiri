  type: single
- answer: Přidání tras do vlastnosti $except pole ve třídě middleware VerifyCsrfToken
  difficulty: střední
  explanation: 'Middleware VerifyCsrfToken má vlastnost $except, kde můžete uvést vzory URI, které by měly přeskočit ověření CSRF. Například: protected $except = [''webhooks/*'', ''api/payment/*''];. Tento
    přístup se běžně používá pro webhooky ze služeb třetích stran (jako Stripe nebo GitHub), které odesílají POST požadavek do vaší aplikace a nemohou zahrnout CSRF token.'
  id: cs-011
  options:
  - Přidání vlastního middleware pro vyjmutí z ověření CSRF na trasy, které chcete vyloučit
  - Nastavení proměnné prostředí CSRF_ENABLED=false v souboru .env pro dané konkrétní trasy
  - Přidání direktivy @csrf_exempt v šablonách Blade pro každou vyloučenou trasu
  - Přidání tras do vlastnosti $except pole ve třídě middleware VerifyCsrfToken
  question: Jaký je správný způsob, jak vyloučit konkrétní trasy z ověření CSRF v middleware VerifyCsrfToken?
  topic: csrf-protection
  type: single
- answers:
  - API routy jsou typicky bezstavové a nepoužívají autentizaci založenou na session cookies
  - Autentizace API používá tokeny (Sanctum, Passport) nebo OAuth, které se posílají v hlavičkách nikoli v cookies, což činí útoky CSRF nemožnými
  - Middleware VerifyCsrfToken je zahrnut pouze ve skupině middleware 'web', nikoli ve skupině 'api'
  difficulty: střední
  explanation: Útoky CSRF spoléhají na automatické odesílání cookies pro požadavky mezi různými zdroji. API routy typicky používají token-based autentizaci (Bearer tokeny v Authorization hlavičkách), které
    prohlížeče automaticky neodesílají. Kromě toho je middleware VerifyCsrfToken pouze ve skupině middleware 'web'. Pokud však použijete SPA autentizaci Sanctum (která používá cookies), ochrana proti CSRF
    se automaticky aplikuje.
  id: cs-012
  options:
  - API požadavky jsou vždy prováděny ze stejného původu, takže CSRF není problémem
  - Middleware VerifyCsrfToken je zahrnut pouze ve skupině middleware 'web', nikoli ve skupině 'api'
  - API routy jsou typicky bezstavové a nepoužívají autentizaci založenou na session cookies
  - Autentizace API používá tokeny (Sanctum, Passport) nebo OAuth, které se posílají v hlavičkách nikoli v cookies, což činí útoky CSRF nemožnými
