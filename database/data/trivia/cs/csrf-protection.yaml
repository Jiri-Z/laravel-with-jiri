- answer: Při novém sezení je vygenerován nový CSRF token, čímž se neplatí jakékoli formuláře, které byly načteny před přihlášením
  difficulty: střední
  explanation: Když Laravel regeneruje sezení (což se standardně děje po přihlášení z bezpečnostních důvodů), stará data sezení — včetně CSRF tokenu — jsou zničena a vytvoří se nové sezení s novým tokenem.
    To znamená, že jakékoli formuláře vykreslené před přihlášením budou obsahovat zastaralý token. Aby se toto vyřešilo, můžete buď znovu načíst stránku po přihlášení, nebo použít JavaScript k obnovení
    CSRF tokenu v DOM.
  id: cs-013
  options:
  - Při novém sezení je vygenerován nový CSRF token, čímž se neplatí jakékoli formuláře, které byly načteny před přihlášením
  - Ověření CSRF je dočasně vypnuto frameworkem během přechodného období přihlášení na několik sekund
  - Stejný CSRF token je zachován ze starého sezení a plynule přenesen do nově vytvořeného sezení
  - CSRF token je uložen v trvalém šifrovaném cookie, které automaticky přežije události regenerace sezení
