- answer: Cross-Site Request Forgery, kde škodlivý web oklamá prohlížeč uživatele, aby neoprávněně vytvořil požadavky na vaši aplikaci
  difficulty: lehká
  explanation: CSRF (Cross-Site Request Forgery) využívá skutečnosti, že prohlížeče automaticky zahrnují cookies (včetně session cookies) s požadavky na doménu. Útočník může vytvořit stránku, která odesílá
    formulář do vaší aplikace, a prohlížeč zahrne session cookie uživatele. Ochrana CSRF v Laravelu tomu brání vyžadováním tajného tokenu, který útočníkův web nemůže znát.
  id: cs-001
  options:
  - SQL injection útoky, kdy jsou škodlivé SQL příkazy vloženy do formulářových polí, aby manipulovaly nebo extrahovaly záznamy z databáze
  - Brute-force útoky, které systematicky pokoušejuhádat uživatelská hesla opakovanými automatizovanými pokusy o přihlášení na přihlašovacích formulářích
  - Cross-Site Scripting (XSS) útoky, kdy je do stránek vaší aplikace vkládán škodlivý JavaScript kód, aby ukradl uživatelská data
  - Cross-Site Request Forgery, kde škodlivý web oklamá prohlížeč uživatele, aby neoprávněně vytvořil požadavky na vaši aplikaci
  question: Jakému typu útoku brání Laravelova ochrana CSRF?
  topic: csrf-protection
  type: single
- answer: '@csrf'
  difficulty: lehká
  explanation: 'Direktiva @csrf v Blade generuje skryté pole vstupu: <input type="hidden" name="_token" value="...">. Tento token je automaticky validován middlewarem VerifyCsrfToken pro všechny POST, PUT,
    PATCH a DELETE požadavky. Je to nejjednodušší a nejčastější způsob, jak do HTML formulářů zahrnout ochranu CSRF.'
  id: cs-002
  options:
  - '@token'
  - '@protect'
  - '@secure'
  - '@csrf'
  question: Která Blade direktiva generuje skryté HTML vstupní pole obsahující CSRF token?
  topic: csrf-protection
  type: single
- answers:
  - GET
  - HEAD
  - OPTIONS
  difficulty: lehká
  explanation: Laravel vylučuje GET, HEAD a OPTIONS požadavky z ověření CSRF. Tyto metody jsou považovány za 'bezpečné' podle HTTP specifikace — neměly by způsobovat změny stavu na serveru. Pouze změnové
    metody (POST, PUT, PATCH, DELETE) vyžadují ověření CSRF tokenu. Proto by vaše aplikace měla používat správnou HTTP metodu pro každou akci.
  id: cs-003
  options:
  - POST
  - GET
  - OPTIONS
  - HEAD
  question: Které HTTP metody jsou ve výchozím nastavení vyloučeny z ověření CSRF middlewarem VerifyCsrfToken v Laravelu?
  topic: csrf-protection
  type: multiple
- alternatives:
  - pole _token
  - _token vstup
  answer: _token
  difficulty: lehká
  explanation: Middleware VerifyCsrfToken v Laravelu hledá vstupní pole požadavku s názvem '_token' (nebo hlavičku X-XSRF-TOKEN). Když použijete direktivu @csrf v Blade, vytvoří skrytý vstup s name='_token'
    obsahující aktuální hodnotu CSRF tokenu. Middleware pak porovná tuto hodnotu s tokenem uloženým v session uživatele.
  id: cs-004
  question: Jaký je název výchozího vstupního pole, které Laravel hledá při ověřování CSRF tokenu z odeslání formuláře?
  topic: csrf-protection
  type: text
- answer: V session datech uživatele
  difficulty: lehká
  explanation: Laravel ukládá CSRF token do session uživatele. Když session začne, Laravel vygeneruje CSRF token a uloží ho do session dat. Token odeslaný s formulářem (pomocí @csrf) musí odpovídat tomu
    uloženému v session. Pokud je session obnovena (např. po přihlášení), vygeneruje se nový CSRF token a staré tokeny se stanou neplatnými.
  id: cs-005
  options:
  - V aplikativní cache (Redis, file cache atd.)
  - V šifrovaném cookie na klientovi
  - V databázové tabulce nazvané csrf_tokens
  - V session datech uživatele
