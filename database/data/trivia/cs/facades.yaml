  question: Které z následujících správně popisují vztah mezi facades a service containerem?
  options:
  - Facades automaticky registrují své vlastní bindingy v kontejneru
  - Facades jsou v podstatě statické proxy k instancím vyřešeným z kontejneru
  - Ke stejné službě lze přistupovat jak přes facade, tak přes constructor injection
  - Odstranění facade bindingu z kontejneru by způsobilo vyhození výjimky facade
  answers:
  - Facades jsou v podstatě statické proxy k instancím vyřešeným z kontejneru
  - Odstranění facade bindingu z kontejneru by způsobilo vyhození výjimky facade
  - Ke stejné službě lze přistupovat jak přes facade, tak přes constructor injection
  explanation: Facades jsou čisté proxy — nic v kontejneru neregistrují. Service providery registrují bindingy a facades k nim přistupují. Pokud binding neexistuje, facade vyhodí RuntimeException. Stejná
    podkladová instance služby je přístupná jak přes facade, tak přes constructor injection, protože oba přístupy řeší službu ze stejného kontejneru.
