  question: Proč jsou facades považovány za testovatelné, ačkoliv používají statická volání metod?
  options:
  - Protože statické metody jsou ze své podstaty snáze mockovatelné a testovatelné izolovaně ve srovnání s voláními instančních metod
  - Protože facades automaticky detekují testovací prostředí a za běhu nahrazují lehkými fake implementacemi
  - Protože PHP nativně podporuje mockování statických metod prostřednictvím vestavěných funkcí reflection a override
