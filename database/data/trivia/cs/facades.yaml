  question: Jak se jmenuje návrhový vzor, který Laravel facades implementují a který poskytuje zjednodušené rozhraní ke komplexnímu subsystému?
  answer: Facade pattern
  alternatives:
  - Facade
  - the Facade pattern
  - facade design pattern
  explanation: Laravel facades implementují návrhový vzor GoF „Facade", který poskytuje jednotné rozhraní k sadě rozhraní v subsystému. Přestože je implementace Laravelu jedinečná, protože kombinuje vzor
    Facade se vzorem Proxy (delegováním na instance vyřešené z kontejneru), základní záměr — poskytnout zjednodušené, pohodlné rozhraní — je stejný.
