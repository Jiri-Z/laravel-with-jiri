  - Vygenerovaná facade třída je zapsána do storage/framework/cache/ a načítána při následujících requestech
  - Laravel generuje dynamickou facade třídu dědící ze základní Facade třídy
  - Vygenerovaná třída implementuje getFacadeAccessor() vracející FQCN původní třídy
  answers:
  - Laravel generuje dynamickou facade třídu dědící ze základní Facade třídy
  - Vygenerovaná třída implementuje getFacadeAccessor() vracející FQCN původní třídy
  explanation: Při použití real-time facade Laravel dynamicky vytváří novou třídu za běhu, která dědí ze základní Facade a implementuje getFacadeAccessor() s FQCN cílové třídy. Třída není zapsána na disk
    — Laravel interně používá eval() k jejímu definování. Funguje celá v paměti bez persistentního cachování.
