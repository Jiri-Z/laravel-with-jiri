  question: Jak systém aliasování facades v Laravelu (používaný pro 'use Cache;') překládá krátký název facade na skutečnou třídu?
  options:
  - Třída Application udržuje alias loader, který mapuje krátké názvy na plně kvalifikované facade třídy
  - Každý facade se registruje v globálním statickém registry poli při prvním odkazu nebo instanciaci
  - Composer classmap autoloader automaticky objeví a zaregistruje všechny dostupné facade aliasy v době instalace
  - Vestavěný PHP class autoloader prohledává include paths pro třídy odpovídající krátkému názvu facade
  answer: Třída Application udržuje alias loader, který mapuje krátké názvy na plně kvalifikované facade třídy
  explanation: Laravel registruje alias loader pomocí spl_autoload_register, který mapuje krátké názvy facades (např. „Cache") na jejich plně kvalifikované názvy tříd (např. „Illuminate\\Support\\Facades\\Cache").
    V Laravel 13.x je to konfigurováno v bootstrap/app.php. Když PHP narazí na nedefinovanou třídu, alias loader ji zachytí a namapuje na správnou facade třídu.
