  question: Jaký je rozdíl mezi tím, jak fungují Facade::fake() a Facade::shouldReceive() v testech?
  options:
  - fake() funguje pouze v feature testech, zatímco shouldReceive() je omezeno na izolované unit test scénáře
  - shouldReceive() kompletně nahrazuje instanci služby; fake() pouze zachytává volání metod bez nahrazení
  - Mezi těmito dvěma přístupy není žádný funkční rozdíl; jsou to aliasy pro stejný testovací mechanismus
  - fake() nahradí celou službu fake implementací; shouldReceive() používá Mockery k mockování konkrétních metod
  answer: fake() nahradí celou službu fake implementací; shouldReceive() používá Mockery k mockování konkrétních metod
  explanation: fake() nahradí celou podkladovou službu lehkou fake implementací (např. ArrayCache, FakeQueue). shouldReceive() používá Mockery k vytvoření částečného mocku, kde jsou mockovány pouze zadané
    metody, zatímco ostatní procházejí na skutečnou implementaci. Použijte fake() pro „nechceme dělat skutečné věci, ale chci si ověřit volání" a shouldReceive() pro „tato konkrétní metoda by měla být zavolána
    s těmito argumenty".
