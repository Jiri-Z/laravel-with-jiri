  answer: Protože podkladová služba je vyřešena z kontejneru, který lze během testování vyměnit za mock
  explanation: Přestože facades používají statickou syntaxi, delegují na instance vyřešené z kontejneru. Během testování můžete nahradit container binding mockem nebo použít specifické testovací metody
    facades jako shouldReceive() nebo fake(). Statické volání je jen syntactic sugar — skutečná práce probíhá na vyměnitelné instanci, což zachovává testovatelnost.
