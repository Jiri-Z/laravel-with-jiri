  answer: Návratová hodnota volání podkladové metody
  alternatives:
  - návratová hodnota podkladové metody
  - cokoliv podkladová metoda vrátí
  - návratová hodnota metody
  explanation: Metoda __callStatic() vyřeší podkladovou službu, zavolá na ní požadovanou metodu se zadanými argumenty a vrátí cokoliv tato metoda vrátí. To znamená, že facades jsou plně transparentní proxy
    — jakákoliv návratová hodnota, včetně objektů pro method chaining, je předána beze změny.
- id: fc-026
  topic: facades
  type: single
  difficulty: těžká
  question: Jaký potenciální problém vzniká při použití real-time facades s konkrétními třídami, které nejsou registrovány v service containeru?
  options:
  - Laravel vyhodí FacadeNotRegisteredException, která indikuje, že pro facade neexistuje žádný container binding
  - Kontejner se pokusí třídu autowirovat, což sice funguje, ale obejde jakékoliv explicitní bindingy nebo konfiguraci
  - Facade vrací null pro každé volání metody a potichu zahodí všechny předané argumenty
  - Facade automaticky registruje nevyřešenou třídu jako singleton binding v service containeru
  answer: Kontejner se pokusí třídu autowirovat, což sice funguje, ale obejde jakékoliv explicitní bindingy nebo konfiguraci
  explanation: Pokud cílová třída není v kontejneru explicitně svázána, Laravel se uchýlí k autowiringu. To znamená, že třída je instanciována se svými constructor závislostmi automaticky vyřešenými. Zatímco
    to funguje pro jednoduché třídy, obejde jakoukoliv vlastní konfiguraci, singletony nebo kontextuální bindingy, které jste zamýšleli, což může vést k neočekávanému chování.
- id: fc-027
  topic: facades
  type: multiple
  difficulty: těžká
  question: Které z následujících tvrzení správně popisují výkonnostní charakteristiky Laravel facades?
  options:
  - Používání facades je významně pomalejší než constructor injection kvůli reflection na každém volání
  - Volání facades přidávají zanedbatelnou režii ve srovnání s přímými voláními instančních metod
  - Každé volání facade spustí resolution z kontejneru, ale vyřešené instance jsou cachovány pro singleton bindingy
  - Laravel cachuje mapování mezi facade třídami a jejich container bindingy
  answers:
  - Každé volání facade spustí resolution z kontejneru, ale vyřešené instance jsou cachovány pro singleton bindingy
  - Laravel cachuje mapování mezi facade třídami a jejich container bindingy
  explanation: Každé volání metody facade vyřeší službu z kontejneru, ale u singletonů (které většina facades používá) je instance cachována po prvním vyřešení. Laravel také cachuje mapování facade na binding.
    Skutečná režie na volání je minimální — jen lookup v poli a dispatch metody — což činí facades dostatečně výkonné pro produkční použití.
- id: fc-028
  topic: facades
  type: single
  difficulty: těžká
  question: Jak můžete přistoupit k vyřešené instanci za facade bez volání jakékoliv konkrétní metody na ní?
  options:
  - Facade::getFacadeRoot()
  - Facade::getInstance()
  - Facade::resolvedInstance()
  - app(Facade::class)
  answer: Facade::getFacadeRoot()
  explanation: Statická metoda getFacadeRoot() na základní Facade třídě vrací vyřešenou instanci služby z kontejneru. To je užitečné, když potřebujete předat podkladovou instanci jiné službě nebo provést
    operace, které nejsou dostupné přes facade rozhraní. Každý facade má také getFacadeRoot() alias na úrovni instance.
- id: fc-029
  topic: facades
  type: text
  difficulty: těžká
  question: Jaký návrhový vzor v kombinaci se vzorem Facade Laravel používá k poskytování statického přístupu k instancím služeb vyřešeným z kontejneru?
  answer: Proxy pattern
  alternatives:
  - Proxy
  - the Proxy pattern
  - Service Locator
  - service locator pattern
  explanation: Laravel facades kombinují vzor Facade (poskytování zjednodušeného rozhraní) se vzorem Proxy (předávání volání jinému objektu). Statická facade třída funguje jako proxy k instanci vyřešené
    z kontejneru. Někteří to také popisují jako variantu vzoru Service Locator, protože kontejner funguje jako locator, který facade dotazuje pro nalezení služby.
