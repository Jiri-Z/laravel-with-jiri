  difficulty: těžká
  explanation: Při použití vlastního klíče pro vazbu modelu trasy (jako 'slug') Laravel provede dotaz WHERE slug = ? a vezme první výsledek pomocí firstOrFail(). NEKONTROLUJÍ jedinečnost — pokud více záznamů
    má stejný slug, vrátí ten, který databáze vrátí jako první (typicky ten s nejnižším primárním klíčem). Proto byste měli zajistit, aby vlastní vazební klíče byly v databázi jedinečné, nebo použít vázané
    vazby k omezení výsledků.
