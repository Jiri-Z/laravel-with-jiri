  - Použijte metodu app()->instance() k navázání mock implementace před tím, než test provede požadavek
  difficulty: těžká
  explanation: 'Laravel poskytuje několik testovacích strategií pro controllery: (1) app()->instance() nebo app()->bind() pro výměnu služby v kontejneru, (2) $this->mock(Interface::class) pro automatické
    mockování, (3) přímou instanci pro unit testy, které nepotřebují celý HTTP stack. Metoda withMiddleware() je pro konfiguraci middleware, ne pro mockování závislostí. Každý přístup má kompromisy mezi
    pokrytím integrace a izolací testu.'
  id: ct-029
  options:
