  - Laravel vyvolá výjimku HTTP 403 Forbidden před zavoláním metody controlleru, čímž zabrání jejímu provedení
  - FormRequest vyvolá ValidationException obsahující vlastní chybovou zprávu o neoprávněném přístupu a stavový kód 401
