  difficulty: střední
  explanation: Metoda ->only() na middleware aplikovaném v konstruktoru omezuje middleware na specifické metody. V tomto případě budou vyžadovat autentizaci pouze metody create() a store(). Ostatní metody
    jako index(), show(), edit(), update() a destroy() budou přístupné bez autentizace. Opakem je metoda ->except(), která aplikuje middleware na všechny metody kromě specifikovaných.
