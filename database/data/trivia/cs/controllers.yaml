- answer: Zaregistruje autorizační middleware, který mapuje každou metodu kontroleru zdrojů na odpovídající metodu policy (např. "index" se mapuje na "viewAny", "show" se mapuje na "view")
  difficulty: střední
  explanation: 'Metoda authorizeResource() automaticky mapuje metody kontroleru zdrojů na metody policy: index→viewAny, create→create, store→create, show→view, edit→update, update→update, destroy→delete.
    To znamená, že každý požadavek na kontroler zdrojů automaticky kontroluje odpovídající metodu policy před spuštěním akce kontroleru, což poskytuje komplexní autorizaci bez ručních kontrol v každé metodě.'
  id: ct-013
  options:
  - Generuje oborově vázané API autentizační tokeny pro model zdrojů a automaticky registruje specializované middleware pro ověřování tokenů na každé metodě kontroleru
  - Automaticky generuje novou třídu policy pro přidružený Eloquent model kontroleru s výchozími pravidly autorizace typu "zakázat vše" pro každou akci
  - Autorizuje všechny autentizované uživatele k volnému přístupu ke každé akci na kontroleru zdrojů, úplně vynechává jakékoliv kontroly oprávnění nebo policy gates
  - Zaregistruje autorizační middleware, který mapuje každou metodu kontroleru zdrojů na odpovídající metodu policy (např. "index" se mapuje na "viewAny", "show" se mapuje na "view")
