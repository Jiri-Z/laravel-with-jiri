  difficulty: střední
  explanation: Kontejner služeb Laravelu provádí injekci metodou kontrolou type hintů v metodě controlleru a řeší každý parametr z kontejneru. Můžete použít type hint pro Request, Eloquent modely (pro route
    model binding) a jakoukoliv registrovanou službu. Pořadí není důležité — Laravel páruje podle typu, ne podle pozice. To dělá controllery čisté a snadno testovatelné přes mockování závislostí.
  id: ct-015
  options:
  - Injekce závislostí funguje pouze pro objekt Request v controllerech; všechny ostatní typy služeb musí být řešeny manuálně pomocí app()
  - Kontejner služeb Laravelu řeší každý parametr podle typu, vhodnou instancí bez ohledu na pořadí parametrů
  - Parametry jsou vkládány na základě jejich pozice — první parametr musí být vždy Request, druhý model
  - Každou závislost musíte manuálně instantiate pomocí helper funkcí app() nebo resolve() uvnitř těla metody controlleru
