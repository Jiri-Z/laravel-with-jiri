- answer: FormRequest třídy oddělují logiku validace od controllerů, což činí kód znovupoužitelnějším, testovatelnějším a v souladu se zásadou jediné odpovědnosti
  difficulty: střední
  explanation: 'FormRequest třídy zapouzdřují validační pravidla a autorizační logiku ve vyhrazené třídě. Výhody zahrnují: (1) controllerů zůstávají zaměřeny na zpracování požadavků, (2) validační pravidla
    mohou být znovupoužitelná napříč více controllerů, (3) FormRequest lze nezávisle jednotestovat a (4) authorized() metoda poskytuje čisté oddělení autorizačních kontrol. Vložená validace je vhodná pro
    jednoduché případy, ale dobře neškáluje.'
  id: ct-010
  options:
  - FormRequest třídy oddělují logiku validace od controllerů, což činí kód znovupoužitelnějším, testovatelnějším a v souladu se zásadou jediné odpovědnosti
  - FormRequest třídy poskytují automatickou konverzi typů a databázové přetypování sloupců pro všechny odeslané vstupní pole, což vložená validace nemůže provádět
  - FormRequest třídy jsou výrazně rychlejší než vložená validace, protože jejich validační pravidla jsou předem zkompilována do cacheovaných PHP souborů při startu aplikace
  - Vložená validace má známé omezení, kdy nemůže správně zpracovat pole nahrávaných souborů nebo vůbec validovat hluboce vnořené struktury pole
