- id: rl-001
  topic: request-lifecycle
  type: single
  difficulty: easy
  question: What is the entry point for every HTTP request in a Laravel application?
  options:
  - app/bootstrap.php
  - public/start.php
  - bootstrap/app.php
  - public/index.php
  answer: public/index.php
  explanation: Every HTTP request enters through public/index.php, which is the web server's document root. This file loads Composer's autoloader and bootstraps the Laravel application instance before handling
    the request.
- id: rl-002
  topic: request-lifecycle
  type: single
  difficulty: easy
  question: Which method on the Application instance is used to handle an incoming HTTP request and return a response in Laravel 13.x?
  options:
  - Application::handle()
  - Application::handleRequest()
  - Application::run()
  - Application::dispatch()
  answer: Application::handle()
  explanation: In Laravel 13.x, the Application class's handle() method is the single entry point that takes an HTTP request, runs it through the full lifecycle including middleware and routing, and returns
    an HTTP response.
- id: rl-003
  topic: request-lifecycle
  type: text
  difficulty: easy
  question: What file is the HTTP kernel replaced by in Laravel 13.x's streamlined application structure?
  answer: bootstrap/app.php
  alternatives:
  - bootstrap/app
  - bootstrap/app.PHP
  explanation: Laravel 13.x eliminated the separate HTTP and Console kernel files. All application bootstrapping, middleware registration, and configuration now happens in bootstrap/app.php, significantly
    simplifying the framework's request lifecycle.
- id: rl-004
  topic: request-lifecycle
  type: single
  difficulty: easy
  question: In what order does Laravel typically process middleware during a request?
  options:
  - Route middleware first, then global middleware, then the response is returned
  - Global middleware, then route middleware, then controller logic
  - Route middleware, controller logic, then global middleware
  - All middleware executes after the controller returns a response
  answer: Global middleware, then route middleware, then controller logic
  explanation: Laravel processes global middleware first (applied to every request), then route-specific middleware, and finally reaches the controller or closure. On the response path, middleware executes
    in reverse order (LIFO - Last In, First Out).
- id: rl-005
  topic: request-lifecycle
  type: text
  difficulty: easy
  question: What HTTP status code does Laravel return by default when no route matches the incoming request URI?
  answer: '404'
  alternatives:
  - Not Found
  explanation: When the router cannot find a matching route, Laravel automatically returns a 404 Not Found response. This is generated by the RouteCollection's match method throwing a NotFoundHttpException,
    which is caught by the exception handler.
- id: rl-006
  topic: request-lifecycle
  type: single
  difficulty: easy
  question: What is the purpose of the bootstrap directory in a Laravel application?
  options:
  - It contains the framework bootstrap files, including app.php which initializes the application
  - It stores application configuration files such as database, mail, and cache driver settings
  - It holds database migration files that define the schema changes for the application
  - It stores compiled Blade templates and cached route files for faster performance
  answer: It contains the framework bootstrap files, including app.php which initializes the application
  explanation: The bootstrap directory houses the app.php file that creates and configures the Application instance. In Laravel 13.x, this is the central place where middleware, providers, and other core
    lifecycle configurations are defined.
- id: rl-007
  topic: request-lifecycle
  type: single
  difficulty: easy
  question: Where does Laravel store cached routes to speed up the request lifecycle?
  options:
  - bootstrap/cache/routes-v7.php
  - storage/framework/routes/
  - storage/cache/routes.php
  - bootstrap/cache/compiled_routes.php
  answer: bootstrap/cache/routes-v7.php
  explanation: Laravel caches compiled routes in the bootstrap/cache directory. Running 'php artisan route:cache' generates this file, which allows the router to skip the route registration phase entirely
    during subsequent requests, improving performance.
- id: rl-008
  topic: request-lifecycle
  type: multiple
  difficulty: easy
  question: Which of the following are phases in the Laravel HTTP request lifecycle?
  options:
  - Database schema compilation
  - Service provider registration and booting
  - HTTP kernel booting and middleware execution
  - Route dispatching to a controller or closure
  answers:
  - HTTP kernel booting and middleware execution
  - Service provider registration and booting
  - Route dispatching to a controller or closure
  explanation: The Laravel request lifecycle includes kernel booting, middleware execution, service provider registration/booting, and route dispatching. Database schema compilation is not part of the standard
    request lifecycle; it's a build-time or migration-time operation.
- id: rl-009
  topic: request-lifecycle
  type: text
  difficulty: easy
  question: In Laravel 13.x, what single method call in bootstrap/app.php returns the prepared Application instance?
  answer: Application::configure()
  alternatives:
  - Application::configure
  - configure()
  explanation: Laravel 13.x uses the fluent Application::configure() method chain in bootstrap/app.php to set up the application. This replaces the older pattern of creating an App instance and binding
    the HTTP kernel separately, making the bootstrap process more declarative.
- id: rl-010
  topic: request-lifecycle
  type: single
  difficulty: medium
  question: Why does Laravel recommend placing the web document root at the 'public' directory rather than the project root?
  options:
  - To prevent unauthorized access to sensitive files like .env, config, and source code
  - To enable Laravel's built-in HTTP/2 server push for improved asset loading performance
  - Because Composer requires the public directory for class autoloading to function correctly
  - To reduce the size of the HTTP request payload by excluding framework files from the root
  answer: To prevent unauthorized access to sensitive files like .env, config, and source code
  explanation: By setting the document root to public/, only files meant to be web-accessible (index.php, assets) are exposed. Files like .env, database migrations, and configuration files remain outside
    the web root, protecting them from direct URL access—a critical security measure.
- id: rl-011
  topic: request-lifecycle
  type: multiple
  difficulty: medium
  question: In Laravel 13.x, which of the following happen during the service provider boot phase?
  options:
  - Database connections are established
  - Providers call $app->booted() callbacks
  - All providers have been registered and their bindings are available
  - Route registration occurs
  answers:
  - Providers call $app->booted() callbacks
  - All providers have been registered and their bindings are available
  - Route registration occurs
  explanation: During the boot phase, all service providers have already been registered, so their bindings are available in the container. Providers can register routes, event listeners, and perform tasks
    that depend on other registered services. Database connections are lazy-loaded, not established during boot.
- id: rl-012
  topic: request-lifecycle
  type: single
  difficulty: medium
  question: What happens when a terminate middleware's terminate() method is called?
  options:
  - It aborts the current request immediately and sends a 500 Internal Server Error response
  - It runs after the response has been sent to the browser, useful for cleanup or logging
  - It terminates the PHP worker process handling the request and spawns a replacement
  - It stops all subsequent middleware from executing and returns the current response early
  answer: It runs after the response has been sent to the browser, useful for cleanup or logging
  explanation: The terminate() method on middleware runs after the response is sent to the client. This is useful for post-response tasks like writing access logs, collecting metrics, or cleaning up resources.
    Laravel calls this method using the FastCGI finish_request or Symfony's TerminableMiddlewareInterface.
- id: rl-013
  topic: request-lifecycle
  type: text
  difficulty: medium
  question: What is the name of the design pattern that Laravel's middleware pipeline implements for processing requests through an ordered chain?
  answer: Chain of Responsibility
  alternatives:
  - chain of responsibility
  - Chain of responsibility pattern
  - Responsibility chain
  explanation: Laravel's middleware pipeline follows the Chain of Responsibility pattern. Each middleware can handle the request, pass it to the next middleware, or short-circuit the chain by returning
    a response early. The pipe-and-filter approach lets you compose complex request processing from small, focused middleware.
- id: rl-014
  topic: request-lifecycle
  type: single
  difficulty: medium
  question: How does Laravel's exception handler fit into the request lifecycle?
  options:
  - It replaces the routing layer entirely when any exception occurs, falling back to a predefined error handler route
  - It wraps the entire request lifecycle and catches any exceptions thrown during routing, controller execution, or middleware
  - It only activates during local development when using the artisan serve command for the built-in PHP development server
  - It runs as the first global middleware before any other processing, intercepting errors before they can propagate further
  answer: It wraps the entire request lifecycle and catches any exceptions thrown during routing, controller execution, or middleware
  explanation: The exception handler is registered as a singleton and wraps the request dispatch process. Any exception thrown during the lifecycle—whether from middleware, the router, controllers, or views—is
    caught by the handler, which converts it into an appropriate HTTP response based on the exception type and the application's debug mode.
- id: rl-015
  topic: request-lifecycle
  type: multiple
  difficulty: medium
  question: Which of these correctly describe Laravel's middleware execution order when processing a request and then its response?
  options:
  - Middleware executes in LIFO order for the response phase
  - Global middleware runs before route middleware during the request phase
  - The 'before' middleware logic runs on the way in, 'after' logic runs on the way out
  - All middleware runs again from the beginning during the response phase
  answers:
  - Middleware executes in LIFO order for the response phase
  - Global middleware runs before route middleware during the request phase
  - The 'before' middleware logic runs on the way in, 'after' logic runs on the way out
  explanation: 'Middleware forms an onion-like structure: global then route middleware wrap around the controller. On the request path, middleware runs top-to-bottom. After the controller returns, the response
    passes back through each middleware in reverse (LIFO). Code before $next($request) runs on the way in; code after runs on the way out.'
- id: rl-016
  topic: request-lifecycle
  type: single
  difficulty: medium
  question: What role does the Router play in the Laravel request lifecycle after middleware has been processed?
  options:
  - "It establishes the database connection needed for the controller and begins a transaction"
  - "It manages session data across requests and ensures the session is loaded before executing"
  - "It matches the request URI and HTTP method against registered routes and dispatches to the matched route's handler"
  - "It serializes the controller's return value into either a JSON response or a rendered HTML view"
  answer: It matches the request URI and HTTP method against registered routes and dispatches to the matched route's handler
  explanation: After passing through the middleware stack, the request reaches the Router, which attempts to match the URL path and HTTP verb against all registered routes. Once matched, it extracts route
    parameters, runs route middleware, and dispatches the request to the controller or closure defined in the route.
- id: rl-017
  topic: request-lifecycle
  type: text
  difficulty: medium
  question: In Laravel 13.x, what PHP interface must a middleware implement to have its terminate() method automatically called after the response is sent?
  answer: TerminableMiddleware
  alternatives:
  - Symfony\Component\HttpKernel\TerminableMiddlewareInterface
  - Illuminate\Contracts\Http\TerminableMiddleware
  explanation: In Laravel 13.x, middleware implementing the TerminableMiddleware interface (or the Symfony TerminableMiddlewareInterface) will have their terminate() method invoked after the response is
    sent to the browser. This is particularly useful for tasks that should not block the response, such as logging or metrics collection.
- id: rl-018
  topic: request-lifecycle
  type: single
  difficulty: medium
  question: Why might a developer use 'php artisan route:cache' in a production environment?
  options:
  - To automatically generate missing route definition files that are referenced but not yet created
  - To clear invalid or outdated routes from the cache that no longer have a corresponding controller method
  - To reduce memory usage by storing the compiled route definitions in a database instead of in memory
  - To eliminate the overhead of route registration on every request by loading a pre-compiled route file
  answer: To eliminate the overhead of route registration on every request by loading a pre-compiled route file
  explanation: The route:cache command serializes all registered routes into a single cached file. On subsequent requests, Laravel loads this file instead of re-registering every route, which can significantly
    reduce boot time in applications with many routes. This is a standard production optimization.
- id: rl-019
  topic: request-lifecycle
  type: multiple
  difficulty: medium
  question: In Laravel 13.x, which of the following are true about the Application::configure() method chain in bootstrap/app.php?
  options:
  - It can register middleware groups and single middleware
  - It returns the Application instance for method chaining
  - It replaces the need for separate HTTP and Console kernel classes
  - It must be called from within a service provider
  answers:
  - It returns the Application instance for method chaining
  - It can register middleware groups and single middleware
  - It replaces the need for separate HTTP and Console kernel classes
  explanation: The Application::configure() fluent API introduced in recent Laravel versions and refined in 13.x allows all application setup—middleware registration, provider configuration, path definitions—through
    a single method chain. This eliminates the traditional HTTP/Console kernel separation. It is called in bootstrap/app.php, not from service providers.
- id: rl-020
  topic: request-lifecycle
  type: single
  difficulty: medium
  question: What is the purpose of the 'bootstrapping' phase that occurs before the service providers are registered?
  options:
  - It establishes WebSocket connections for real-time broadcasting features and event-driven communication
  - It compiles all Blade templates into cached PHP files for significantly faster rendering on each request
  - It sets up fundamental environment detection, configuration loading, exception handling, and facades
  - It runs all pending database migrations automatically before the application begins handling the request
  answer: It sets up fundamental environment detection, configuration loading, exception handling, and facades
  explanation: 'Before any service providers run, Laravel bootstraps the core environment: it detects the environment (.env loading), loads configuration files, registers the exception handler, sets up
    the logging facility, and prepares facades. This ensures all providers have a consistent foundation to work with.'
- id: rl-021
  topic: request-lifecycle
  type: text
  difficulty: medium
  question: What artisan command clears all cached files related to the request lifecycle, including routes, config, views, and events?
  answer: php artisan optimize:clear
  alternatives:
  - artisan optimize:clear
  - php artisan optimize-clear
  explanation: 'The ''php artisan optimize:clear'' command is a convenience command that runs multiple cache-clear commands at once: route:clear, config:clear, view:clear, cache:clear, event:clear, and
    more. It''s useful during development when cached files may cause stale behavior.'
- id: rl-022
  topic: request-lifecycle
  type: single
  difficulty: medium
  question: How does Laravel handle a request to a URL that matches a route but uses the wrong HTTP method (e.g., GET instead of POST)?
  options:
  - It returns a 403 Forbidden response with no additional information about allowed methods
  - It silently falls back to a matching GET route if one is defined for the same URI
  - It throws a MethodNotAllowedHttpException, which returns a 405 response
  - It redirects the user to the same URL but with the correct HTTP method header attached
  answer: It throws a MethodNotAllowedHttpException, which returns a 405 response
  explanation: When the URL matches a route pattern but the HTTP method doesn't match any registered routes, Laravel throws a MethodNotAllowedHttpException. The exception handler converts this to a 405
    Method Not Allowed response, which may also include an Allow header listing valid HTTP methods for that URI.
- id: rl-023
  topic: request-lifecycle
  type: multiple
  difficulty: medium
  question: Which of the following are valid reasons to create a custom middleware in the request lifecycle?
  options:
  - To authenticate or authorize users before reaching the controller
  - To transform the request input before it reaches the controller
  - To modify the response after the controller has processed it
  - To directly query the database for all registered routes
  answers:
  - To authenticate or authorize users before reaching the controller
  - To transform the request input before it reaches the controller
  - To modify the response after the controller has processed it
  explanation: Middleware is ideal for cross-cutting concerns like authentication, authorization, input transformation, and response modification. It should not be used for core business logic like database
    queries for route discovery—that's the router's responsibility.
- id: rl-024
  topic: request-lifecycle
  type: text
  difficulty: medium
  question: What method on the Response object does Laravel call to send the response headers and body to the browser?
  answer: send()
  alternatives:
  - Response::send
  - $response->send()
  explanation: After the entire middleware pipeline completes and the controller returns a response, Laravel calls the Response::send() method. This method sends the HTTP status line, headers, and response
    body to the client. The send() method is the final step before terminate middleware runs.
- id: rl-025
  topic: request-lifecycle
  type: single
  difficulty: hard
  question: In Laravel 13.x, how does the framework ensure that singleton services bound in the container are not re-instantiated during subsequent middleware layers within the same request?
  options:
  - By using PHP's static variables to persist resolved instances across function calls within the middleware stack
  - By serializing resolved service instances to the session storage between each middleware layer execution
  - By storing resolved instances in the container's 'instances' array and returning them on subsequent resolve calls
  - By using a global $_GLOBALS variable to track all instantiated services and prevent duplicate resolution
  answer: By storing resolved instances in the container's 'instances' array and returning them on subsequent resolve calls
  explanation: The service container maintains an 'instances' array (and a 'resolved' array) to track singleton bindings. When a singleton is resolved for the first time, the container stores the instance.
    On subsequent resolution attempts within the same request, it returns the stored instance instead of creating a new one, ensuring consistent behavior across the middleware stack.
- id: rl-026
  topic: request-lifecycle
  type: multiple
  difficulty: hard
  question: In a Laravel 13.x application using Octane with Swool, which of the following request lifecycle behaviors change compared to traditional FPM?
  options:
  - The application is booted once and kept in memory across multiple requests
  - The service container and all service providers are re-booted for each request
  - Middleware is no longer executed between requests
  - Singleton instances persist between requests, potentially causing state leaks
  answers:
  - The application is booted once and kept in memory across multiple requests
  - Singleton instances persist between requests, potentially causing state leaks
  explanation: With Octane (Swoole/RoadRunner), Laravel boots once and stays resident in memory. This means the bootstrap, service provider registration, and route caching phases happen only once. However,
    singleton instances persist between requests, so developers must be careful not to store request-specific state in singleton services—this is a fundamental lifecycle difference from traditional FPM.
- id: rl-027
  topic: request-lifecycle
  type: text
  difficulty: hard
  question: In the context of Laravel's request lifecycle, what is the term for the process of converting a route URI pattern like '/users/{id}' into a compiled regex for fast matching?
  answer: route compilation
  alternatives:
  - Route compiling
  - route compilation
  - compiling routes
  explanation: Route compilation is the process where Laravel converts route URI patterns (with optional parameters, wildcards, and constraints) into regular expressions for efficient matching. Compiled
    routes are cached via route:cache. The RouteCompiler class handles this, generating Symfony-compatible regex patterns that the router uses for fast URL matching.
- id: rl-028
  topic: request-lifecycle
  type: single
  difficulty: hard
  question: What is the key difference between how Laravel handles a request that throws an exception during the 'boot' phase of service providers versus during controller execution?
  options:
  - Controller exceptions trigger a redirect to the previous page, while boot-phase exceptions always show a generic 500 error page
  - Exceptions during the boot phase are silently logged to a file, while controller exceptions are fully displayed to the end user
  - There is no difference between the two; all exceptions pass through the same handler and produce an identical error response
  - Boot-phase exceptions may prevent the entire application from serving any request, while controller exceptions only affect the single request
  answer: Boot-phase exceptions may prevent the entire application from serving any request, while controller exceptions only affect the single request
  explanation: If a service provider's boot method throws an exception, the application bootstrap itself fails, meaning the application cannot complete its initialization. This can render the entire application
    unusable until the error is fixed. Controller exceptions, by contrast, are caught per-request and only affect that specific request, leaving the application functional for other users.
- id: rl-029
  topic: request-lifecycle
  type: multiple
  difficulty: hard
  question: In Laravel 13.x, when 'php artisan config:cache' is run, which of the following lifecycle implications occur?
  options:
  - The .env file is no longer read on each request; the cached config is used instead
  - Changes to .env variables will NOT take effect until config:cache is re-run
  - All service providers are re-registered immediately
  - The application automatically detects config changes and re-caches
  answers:
  - The .env file is no longer read on each request; the cached config is used instead
  - Changes to .env variables will NOT take effect until config:cache is re-run
  explanation: When config:cache is run, Laravel combines all config files with .env values into a single cached file in bootstrap/cache/. After this, the .env file is not read on each request. Any changes
    to .env or config files will be ignored until you run config:clear followed by config:cache again. This is a common source of confusion in production debugging.
