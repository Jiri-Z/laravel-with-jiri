- id: mw-001
  topic: middleware
  type: single
  difficulty: easy
  question: What is the fundamental purpose of middleware in a Laravel application?
  options:
  - To filter and inspect HTTP requests before they reach the route handler, and to modify responses before they are sent back to the client
  - To compile Blade template files into cached PHP code before rendering, and to manage the compiled template cache lifecycle
  - To serve as the central entry point for all incoming HTTP requests before they reach the router, handling initial bootstrapping
  - To manage database connection pooling and perform query optimization for each incoming request, improving response times
  answer: To filter and inspect HTTP requests before they reach the route handler, and to modify responses before they are sent back to the client
  explanation: Middleware forms a layered filter chain around your application. Each middleware can inspect the incoming request, perform actions (like authentication, logging, or rate limiting), pass the
    request deeper into the stack, and then modify the response on its way back out. This design pattern provides a clean, composable way to handle cross-cutting concerns.
- id: mw-002
  topic: middleware
  type: single
  difficulty: easy
  question: Which artisan command is used to create a new middleware class in Laravel?
  options:
  - php artisan generate:middleware CheckAge
  - php artisan create:middleware CheckAge
  - php artisan make:middleware CheckAge
  - php artisan middleware:new CheckAge
  answer: php artisan make:middleware CheckAge
  explanation: The make:middleware command creates a new middleware class in app/Http/Middleware/. The generated class includes a handle() method with the $request and $next closure parameters, ready for
    you to add your logic. This is the standard way to scaffold middleware in Laravel.
- id: mw-003
  topic: middleware
  type: multiple
  difficulty: easy
  question: Which of the following are valid ways to apply middleware to a route?
  options:
  - Using the ->middleware() method directly on a route definition
  - Adding the middleware class to the .env file's APP_MIDDLEWARE variable
  - Registering the middleware as global in bootstrap/app.php
  - Assigning the middleware to a route group
  answers:
  - Using the ->middleware() method directly on a route definition
  - Assigning the middleware to a route group
  - Registering the middleware as global in bootstrap/app.php
  explanation: 'Middleware can be applied at three levels: per-route using ->middleware(), per-group using Route::middleware()->group(), or globally in bootstrap/app.php with ->withMiddleware(). There is
    no APP_MIDDLEWARE .env variable — middleware configuration is done in PHP code, not environment variables.'
- id: mw-004
  topic: middleware
  type: text
  difficulty: easy
  question: What are the two parameters that every middleware's handle() method receives?
  answer: $request and $next
  alternatives:
  - Request $request, Closure $next
  - the request and the next closure
  - $request, Closure $next
  - request and next
  explanation: Every middleware handle() method receives an Illuminate\Http\Request object ($request) and a Closure ($next) that passes control to the next middleware in the stack. The $request contains
    the incoming HTTP request data, and calling $next($request) passes the request to the next layer and returns the response.
- id: mw-005
  topic: middleware
  type: single
  difficulty: easy
  question: What does the 'auth' middleware alias resolve to by default in a Laravel application?
  options:
  - App\Http\Middleware\Authenticate
  - App\Http\Middleware\EnsureUserIsAdmin
  - Illuminate\Auth\Middleware\Authorize
  - App\Http\Middleware\RedirectIfAuthenticated
  answer: App\Http\Middleware\Authenticate
  explanation: The 'auth' middleware alias is mapped to App\Http\Middleware\Authenticate (or Illuminate\Auth\Middleware\Authenticate in older versions). This middleware checks if the user is authenticated
    and, if not, redirects them to the login route (for web requests) or returns a 401 JSON response (for API requests).
- id: mw-006
  topic: middleware
  type: multiple
  difficulty: easy
  question: Which middleware classes are included in Laravel's default 'web' middleware group?
  options:
  - VerifyCsrfToken
  - ThrottleRequests
  - TrimStrings
  - EncryptCookies
  answers:
  - EncryptCookies
  - VerifyCsrfToken
  - TrimStrings
  explanation: The 'web' middleware group includes EncryptCookies (decrypts encrypted cookies), StartSession (starts the session), VerifyCsrfToken (validates CSRF tokens), TrimStrings (trims string input),
    and ConvertEmptyStringsToNull. ThrottleRequests is not in the default web group — it is typically applied selectively to routes that need rate limiting.
- id: mw-007
  topic: middleware
  type: single
  difficulty: easy
  question: What happens when a middleware's handle() method returns a response without calling $next($request)?
  options:
  - Laravel throws a MiddlewareException because the middleware pipeline contract requires that every handler must call $next($request)
  - The response is temporarily buffered and sent to the client only after all remaining middleware in the pipeline has fully executed
  - The middleware chain is short-circuited and the response is returned immediately to the client, skipping all remaining middleware and the route handler
  - The request continues to the next middleware, but the returned response object is silently discarded and the final response is used instead
  answer: The middleware chain is short-circuited and the response is returned immediately to the client, skipping all remaining middleware and the route handler
  explanation: By not calling $next($request), a middleware can prevent the request from reaching deeper layers. This is commonly used for access control — for example, an 'auth' middleware might return
    a redirect response if the user is not authenticated, completely bypassing the controller. This short-circuiting behavior is a core feature of the middleware pattern.
- id: mw-008
  topic: middleware
  type: text
  difficulty: easy
  question: What PHP interface can a middleware implement to have a terminate() method called after the response has been sent to the browser?
  answer: TerminableMiddleware
  alternatives:
  - Illuminate\Contracts\Routing\TerminableMiddleware
  - TerminableMiddleware interface
  explanation: The TerminableMiddleware interface (or simply defining a terminate($request, $response) method on your middleware) allows post-response logic. The terminate() method runs after the response
    has been sent to the browser, making it ideal for tasks like logging, collecting metrics, or cleaning up resources. Note that terminate() is called by Laravel's HTTP kernel, not during the middleware
    chain execution.
- id: mw-009
  topic: middleware
  type: multiple
  difficulty: easy
  question: Which of the following are registered as global middleware by default in a fresh Laravel application?
  options:
  - TrustProxies
  - VerifyCsrfToken
  - TrimStrings
  - PreventRequestsDuringMaintenance
  answers:
  - TrimStrings
  - TrustProxies
  - PreventRequestsDuringMaintenance
  explanation: Global middleware runs on every request. Laravel's defaults include TrimStrings (trims input), TrustProxies (handles load balancer headers), PreventRequestsDuringMaintenance (blocks requests
    during php artisan down), and ValidatePostSize (validates content length). VerifyCsrfToken is in the 'web' group, not global, so it only applies to web routes.
- id: mw-010
  topic: middleware
  type: single
  difficulty: medium
  question: Why might a middleware's terminate() method receive different object instances than its handle() method in a production environment with certain PHP configurations?
  options:
  - Because the response object is cloned before being sent to the client and the original is destroyed
  - Because PHP's OPcache serializes and deserializes objects between handle() and terminate(), creating new instances
  - Because Laravel creates a fresh request instance for the terminate phase to avoid memory leaks from accumulated data
  - Because the terminate() method is called in a separate PHP process from handle() when using PHP-FPM
  answer: Because PHP's OPcache serializes and deserializes objects between handle() and terminate(), creating new instances
  explanation: When using PHP-FPM or Swoole, the terminate() lifecycle may run in a different context than handle(). For terminateable middleware, Laravel serializes the middleware instance (if necessary)
    and may deserialize it later, potentially creating different object instances. This means you should not rely on object state set in handle() being available in terminate(). Instead, extract needed
    data from $request and $response parameters directly.
- id: mw-011
  topic: middleware
  type: single
  difficulty: medium
  question: What is the difference between before middleware and after middleware in terms of code placement within the handle() method?
  options:
  - Before middleware is a separate class implementing BeforeMiddleware interface; after middleware implements AfterMiddleware
  - There is no real difference — Laravel treats all middleware identically regardless of where the $next() closure is called
  - Before middleware executes logic before calling $next($request); after middleware executes logic after calling $next($request)
  - Before middleware uses a dedicated before() method instead of handle(); after middleware uses a separate after() method
  answer: Before middleware executes logic before calling $next($request); after middleware executes logic after calling $next($request)
  explanation: The distinction is purely positional within the handle() method. Code placed before $next($request) runs as the request travels inward (before the controller), while code after $next($request)
    runs as the response travels outward (after the controller). A single middleware can perform both before and after logic, making the pattern very flexible without requiring separate classes.
- id: mw-012
  topic: middleware
  type: multiple
  difficulty: medium
  question: In Laravel 11+, which of the following are valid ways to register middleware aliases in bootstrap/app.php?
  options:
  - Directly adding to the 'middleware.aliases' configuration key in config/app.php
  - Using the $middleware->alias() method inside the withMiddleware() closure
  - ->middleware(['admin' => EnsureUserIsAdmin::class])
  - ->withMiddleware(function (Middleware $middleware) { $middleware->alias(['admin' => EnsureUserIsAdmin::class]); })
  answers:
  - ->withMiddleware(function (Middleware $middleware) { $middleware->alias(['admin' => EnsureUserIsAdmin::class]); })
  - Using the $middleware->alias() method inside the withMiddleware() closure
  explanation: In Laravel 11+, middleware configuration is centralized in bootstrap/app.php using the withMiddleware() closure. The Middleware instance passed to the closure provides methods like alias(),
    append(), prepend(), and group() for configuring middleware. The old config/app.php approach was removed in Laravel 11's slim skeleton.
- id: mw-013
  topic: middleware
  type: single
  difficulty: medium
  question: What does the 'throttle:60,1' middleware parameter configuration mean?
  options:
  - Allow a maximum of 1 request every 60 seconds, with additional requests being blocked
  - Allow 60 requests, then block for 1 full second before permitting additional requests through
  - Allow a maximum of 60 requests per second, with the limit counter resetting each second
  - Allow a maximum of 60 requests per 1 minute, with the count resetting every minute
  answer: Allow a maximum of 60 requests per 1 minute, with the count resetting every minute
  explanation: 'The throttle middleware accepts two parameters: max requests and the decay time in minutes. So ''throttle:60,1'' means 60 requests per 1 minute. This is the legacy syntax — in modern Laravel
    (10+), you can also use named limiters defined with RateLimiter::for() and reference them with ''throttle:api'', which supports per-second limits and more complex strategies.'
- id: mw-014
  topic: middleware
  type: text
  difficulty: medium
  question: What method on the Illuminate\Foundation\Http\Middleware class allows you to exclude specific URIs from a global middleware?
  answer: except
  alternatives:
  - ->except()
  - skip
  - $middleware->except()
  explanation: The except() method (available on certain middleware like TrimStrings, ConvertEmptyStringsToNull, and TrustProxies) lets you define URI patterns that should skip the middleware even when
    it's registered globally. For example, TrimStrings may need to exclude API endpoints that handle raw binary data. You configure this in bootstrap/app.php when registering the middleware.
- id: mw-015
  topic: middleware
  type: single
  difficulty: medium
  question: How does the 'can' middleware differ from the 'auth' middleware in terms of what it checks?
  options:
  - The 'can' middleware validates CSRF tokens and user permissions; 'auth' only validates CSRF tokens
  - The 'can' middleware checks a specific authorization policy ability; 'auth' only verifies the user is authenticated
  - There is no meaningful difference — 'can' is simply an alias for 'auth' that adds additional request logging
  - The 'can' middleware checks both authentication and the user's role; 'auth' only checks authentication
  answer: The 'can' middleware checks a specific authorization policy ability; 'auth' only verifies the user is authenticated
  explanation: The 'can' middleware (e.g., middleware('can:update,post')) checks Laravel's authorization system — specifically, it verifies the authenticated user is authorized to perform a given ability
    on a resource via policies. The 'auth' middleware only ensures the user is logged in. The 'can' middleware implicitly requires authentication (unauthenticated users will get a 403), but it goes further
    to check authorization.
- id: mw-016
  topic: middleware
  type: multiple
  difficulty: medium
  question: Which of the following correctly describe how to pass parameters to middleware from a route definition?
  options:
  - Route::get('/posts', ...)->middleware('role:admin,editor')
  - Route::middleware('role', ['admin', 'editor'])->get('/posts', ...)
  - Route::get('/posts', ...)->middleware(['role' => ['admin', 'editor']])
  - Route::get('/posts', ...)->middleware(new EnsureRole('admin', 'editor'))
  answers:
  - Route::get('/posts', ...)->middleware('role:admin,editor')
  - Route::get('/posts', ...)->middleware(new EnsureRole('admin', 'editor'))
  explanation: 'Middleware parameters can be passed two ways: via a colon-separated string (''middleware:param1,param2'') which Laravel parses and passes as additional arguments to handle(), or by instantiating
    the middleware class directly and passing parameters to its constructor. The array key syntax is not valid for middleware parameters.'
- id: mw-017
  topic: middleware
  type: single
  difficulty: medium
  question: What happens if a middleware throws an exception during the handle() method before calling $next($request)?
  options:
  - The exception propagates up through the middleware stack and is handled by Laravel's exception handler, which generates an error response
  - The exception is silently caught by the framework and the request proceeds to the next middleware in the pipeline as if nothing happened
  - The middleware chain continues execution and the exception details are appended to the final response object as an error payload
  - Laravel automatically retries the request up to 3 times before ultimately returning an HTTP error response to the client
  answer: The exception propagates up through the middleware stack and is handled by Laravel's exception handler, which generates an error response
  explanation: Exceptions in middleware are not silently caught. They bubble up through the middleware stack and are ultimately caught by Laravel's exception handler (registered in bootstrap/app.php). The
    handler converts the exception into an appropriate HTTP response — a 500 error page for web requests or a JSON error for API requests. This is the same exception handling flow as exceptions thrown in
    controllers.
- id: mw-018
  topic: middleware
  type: text
  difficulty: medium
  question: What is the name of the Laravel middleware that prevents requests during maintenance mode (when php artisan down is active)?
  answer: PreventRequestsDuringMaintenance
  alternatives:
  - Illuminate\Foundation\Http\Middleware\PreventRequestsDuringMaintenance
  - CheckForMaintenanceMode
  explanation: The PreventRequestsDuringMaintenance middleware checks if the application is in maintenance mode (determined by the storage/framework/down file). If maintenance mode is active, it returns
    a 503 Service Unavailable response. The older name was CheckForMaintenanceMode, which was renamed in Laravel 8+. In Laravel 11+, this is registered as global middleware by default.
- id: mw-019
  topic: middleware
  type: multiple
  difficulty: medium
  question: Which of the following are true about the $middlewarePriority array in Laravel's HTTP kernel?
  options:
  - Middleware not listed in $middlewarePriority runs in their registration order
  - It can be customized by overriding the property in your application's kernel
  - It ensures that authentication middleware runs before authorization middleware regardless of registration order
  - It only affects global middleware, not route-specific middleware
  answers:
  - It ensures that authentication middleware runs before authorization middleware regardless of registration order
  - Middleware not listed in $middlewarePriority runs in their registration order
  explanation: The $middlewarePriority array (in the HTTP Kernel) defines a fixed ordering for critical middleware classes. Any middleware listed in this array is sorted into its defined position, while
    unlisted middleware retains its registration order. This applies to all middleware — global, group, and route-specific. The default priority ensures sensible ordering like auth before can:authorize.
- id: mw-020
  topic: middleware
  type: single
  difficulty: medium
  question: Why is the TrustProxies middleware necessary when running a Laravel application behind a load balancer or reverse proxy (like Nginx or AWS ELB)?
  options:
  - Because the load balancer terminates SSL and forwards requests as HTTP, and TrustProxies is needed to authenticate the proxy's identity using a shared secret header
  - Because the load balancer terminates SSL and forwards requests as HTTP, so TrustProxies tells Laravel to trust X-Forwarded-* headers for correct URL generation and scheme detection
  - Because the load balancer may modify or buffer the request body during SSL termination, and TrustProxies restores the original unmodified request content
  - Because TrustProxies encrypts the HTTP connection between the load balancer and the Laravel application, ensuring fully secure internal data transmission between services
  answer: Because the load balancer terminates SSL and forwards requests as HTTP, so TrustProxies tells Laravel to trust X-Forwarded-* headers for correct URL generation and scheme detection
  explanation: When behind a reverse proxy, the original request's scheme (HTTPS) and client IP are lost because the proxy makes a new HTTP connection to your app. The proxy adds X-Forwarded-Proto and X-Forwarded-For
    headers, but Laravel doesn't trust these by default for security reasons. TrustProxies tells Laravel which proxies are trusted so it can read these headers to generate correct HTTPS URLs and identify
    the real client IP.
- id: mw-021
  topic: middleware
  type: single
  difficulty: medium
  question: What does the 'signed' middleware do when applied to a route?
  options:
  - It digitally signs the outgoing response with an SSL certificate before sending it back to the client for verification
  - It generates a cryptographic digital signature for the request body payload to ensure data integrity during transit
  - It ensures that the incoming request contains a valid API key or bearer token in the Authorization header
  - It validates that the request URL has a valid signature, rejecting requests with tampered URLs or missing signatures
  answer: It validates that the request URL has a valid signature, rejecting requests with tampered URLs or missing signatures
  explanation: The 'signed' middleware (App\Http\Middleware\ValidateSignature) checks for a valid signature in the request's query string. URLs are signed using URL::signedRoute() or URL::temporarySignedRoute().
    If the signature is missing, invalid, or expired, the middleware returns a 403 (or a custom abort response). This is commonly used for email verification links, password reset links, and other sensitive
    public URLs.
- id: mw-022
  topic: middleware
  type: multiple
  difficulty: medium
  question: Which of the following are valid approaches to conditionally applying middleware based on the request?
  options:
  - Registering middleware with a priority level that determines conditional execution
  - Checking conditions inside the middleware's handle() method and calling $next() or returning a response accordingly
  - Using a closure middleware directly on the route that evaluates the condition
  - Overriding the middleware's shouldRun() method to determine whether to execute
  answers:
  - Checking conditions inside the middleware's handle() method and calling $next() or returning a response accordingly
  - Using a closure middleware directly on the route that evaluates the condition
  explanation: 'The two primary ways to conditionally apply middleware are: (1) add conditional logic inside the handle() method (e.g., checking if the user has a certain role, then either calling $next()
    or returning a forbidden response), or (2) use an inline closure middleware like ->middleware(function ($request, $next) { if ($condition) return $next($request); return redirect(''/''); }). There is
    no shouldRun() method or priority-based conditional execution in Laravel.'
- id: mw-023
  topic: middleware
  type: text
  difficulty: medium
  question: What is the name of the middleware that converts empty strings in request input to null values?
  answer: ConvertEmptyStringsToNull
  alternatives:
  - Illuminate\Foundation\Http\Middleware\ConvertEmptyStringsToNull
  - TrimStrings and ConvertEmptyStringsToNull
  explanation: The ConvertEmptyStringsToNull middleware iterates over the request input and converts empty string values to null. This is useful because HTML forms submit empty fields as empty strings,
    but your application logic often needs to distinguish between 'not provided' (null) and 'provided as empty' (empty string). This middleware is included in the default global middleware stack.
- id: mw-024
  topic: middleware
  type: single
  difficulty: hard
  question: When multiple middleware need to share data with each other or with the controller, what is the recommended Laravel approach rather than using global state or static properties?
  options:
  - Write data to a temporary file on disk and read it from the file in subsequent middleware or the controller
  - Use the Config facade to set dynamic runtime values that persist for the duration of the current HTTP request
  - Store the shared data in the user's session, which is automatically accessible to all middleware and controllers
  - Add custom attributes to the $request object using $request->attributes->set(), which creates a clean per-request data bag
  answer: Add custom attributes to the $request object using $request->attributes->set(), which creates a clean per-request data bag
  explanation: The Request object has an 'attributes' ParameterBag specifically designed for this purpose. Middleware can call $request->attributes->set('key', 'value') and downstream middleware or controllers
    can retrieve it with $request->get('key'). This is preferred over static properties (which leak between requests in long-running processes) or session storage (which shouldn't be used for internal request-scoped
    data).
- id: mw-025
  topic: middleware
  type: single
  difficulty: hard
  question: Why can relying on constructor-injected dependencies in middleware be problematic in environments like Octane or long-running workers?
  options:
  - Because constructor dependencies are resolved once when the middleware is first instantiated, and the injected objects may carry stale state across subsequent requests in a long-running process
  - Because in Octane's execution model, middleware constructors are called after the handle() method, which reverses the normal initialization order and can cause dependencies to be unavailable
  - Because Octane does not support constructor-based dependency injection at all, and middleware must exclusively use method injection to receive their dependencies from the container
  - Because constructor injection in Octane uses a completely separate service container instance than method injection, causing resolved dependencies to be inconsistent
  answer: Because constructor dependencies are resolved once when the middleware is first instantiated, and the injected objects may carry stale state across subsequent requests in a long-running process
  explanation: In traditional PHP-FPM, a new process is spawned per request, so constructor injection always creates fresh instances. But in long-running processes like Octane (Swoole/RoadRunner), middleware
    is instantiated once and reused across many requests. If a constructor-injected service has mutable state, it can leak between requests. This is why Octane's documentation recommends using method injection
    in handle() instead of constructor injection for middleware.
- id: mw-026
  topic: middleware
  type: multiple
  difficulty: hard
  question: Which of the following are true about how Laravel handles middleware ordering when a route has middleware from multiple sources (global, group, and route-specific)?
  options:
  - Route-specific middleware defined via ->middleware() is appended after the group's middleware in the pipeline
  - Group middleware always executes in the exact order defined in the group, regardless of $middlewarePriority
  - The $middlewarePriority array can reorder middleware across all sources, potentially making a route-specific middleware run before a global one
  - Global middleware defined via ->withMiddleware()->append() runs before all group and route middleware
  answers:
  - Global middleware defined via ->withMiddleware()->append() runs before all group and route middleware
  - The $middlewarePriority array can reorder middleware across all sources, potentially making a route-specific middleware run before a global one
  explanation: 'The execution order is: global middleware first, then group middleware, then route-specific middleware. However, the $middlewarePriority array acts as a reorderer — if any middleware class
    (regardless of its source) appears in this array, Laravel sorts it into its priority position. This means a global middleware with lower priority could actually run after a route-specific middleware
    with higher priority.'
- id: mw-027
  topic: middleware
  type: text
  difficulty: hard
  question: In Laravel 11+, what method do you call on the Middleware instance inside withMiddleware() to register a middleware that should run on every API request in the 'api' middleware group?
  answer: appendToGroup
  alternatives:
  - ->appendToGroup('api', MiddlewareClass::class)
  - appendToGroup('api', ...)
  - append
  explanation: In Laravel 11+, the Middleware instance passed to withMiddleware() provides the appendToGroup($group, $middleware) method to add middleware to an existing group. For example, $middleware->appendToGroup('api',
    EnsureTokenIsValid::class) adds the middleware to the 'api' group's stack. You can also use prependToGroup() to add to the beginning of a group, or use the group() method to define an entirely new group.
- id: mw-028
  topic: middleware
  type: single
  difficulty: hard
  question: What is the consequence of registering the same middleware class multiple times in the pipeline for a single request (e.g., once globally, once in a group, and once on the route)?
  options:
  - Laravel automatically deduplicates middleware classes, so the middleware only runs once regardless of how many times it's registered
  - The middleware runs multiple times — once for each registration — which can cause bugs with stateful middleware like session or throttle
  - Laravel throws a DuplicateMiddlewareException at application boot time, preventing the application from starting if duplicates are detected
  - Only the last registration takes effect, and all earlier registrations of the same middleware class are silently ignored by the framework
  answer: The middleware runs multiple times — once for each registration — which can cause bugs with stateful middleware like session or throttle
  explanation: 'Laravel does NOT deduplicate middleware. If the same class appears in global, group, and route middleware, it will execute three times. This can cause serious issues: double CSRF validation,
    multiple throttle counts per request, or session started multiple times. You must be careful to avoid registering the same middleware at multiple levels unless that behavior is intentional.'
- id: mw-029
  topic: middleware
  type: multiple
  difficulty: hard
  question: When building a custom middleware that needs to modify the response after the controller has executed, which of the following approaches are correct and safe?
  options:
  - Modifying the response headers using $response->header() on the captured response from $next($request)
  - Using response()->macro() inside the middleware to add custom response methods
  - Using output buffering with ob_start() in the handle() method to capture and modify the response body
  - Capturing the return value of $next($request) and calling methods on the Response object before returning it
  answers:
  - Capturing the return value of $next($request) and calling methods on the Response object before returning it
  - Modifying the response headers using $response->header() on the captured response from $next($request)
  explanation: 'The correct approach for after-middleware is: $response = $next($request); /* modify $response */; return $response;. You can modify headers, content, and status on the Response object.
    Using ob_start() in middleware is an anti-pattern that can conflict with Laravel''s response handling. The response()->macro() approach modifies global response builder state rather than the specific
    response, which is not what after-middleware is designed for.'
